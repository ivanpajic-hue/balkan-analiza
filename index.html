<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Balkan Avto — Provera isplativosti ture</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f5f4f1;--panel:#ffffff;--panel-2:#fbfaf8;
  --ink:#19222e;--ink-2:#3a4754;--muted:#76808d;
  --line:#e7e4dd;--line-2:#efece6;
  --brand:#0e5c63;--brand-2:#0b7a82;--brand-ink:#08474c;--brand-soft:#e4f0f0;
  --ok:#1f7a4d;--ok-soft:#e7f3ec;--warn:#9a6a12;--warn-soft:#f7efda;
  --danger:#a8392c;--danger-soft:#f6e8e4;
  --shadow:0 1px 2px rgba(20,30,40,.04),0 4px 16px rgba(20,30,40,.05);
  --radius:12px;--r-sm:8px;
  --font:ui-sans-serif,-apple-system,"Segoe UI",Roboto,system-ui,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.num,.money,table.data td.num,table.data th.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
a{color:var(--brand);text-decoration:none}
.eyebrow{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--ink);color:#cdd5dd;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 18px 16px;color:#fff;font-weight:700;font-size:15px;letter-spacing:.01em}
.brand small{display:block;font-weight:500;font-size:11px;color:#8a96a2;margin-top:3px;letter-spacing:.04em;text-transform:uppercase}
.nav{padding:8px}
.nav button{width:100%;text-align:left;background:none;border:0;color:#c2cbd4;padding:11px 13px;border-radius:var(--r-sm);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:11px;font-family:inherit}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:var(--brand);color:#fff;font-weight:600}
.nav .ic{width:18px;text-align:center;opacity:.9}
.who{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#93a0ac}
.who b{color:#fff;font-weight:600}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:rgba(245,244,241,.85);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);padding:15px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.topbar h1{font-size:18px;margin:0;font-weight:650;letter-spacing:-.01em}
.content{padding:24px 26px 60px;max-width:1180px;width:100%}

/* panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
.panel>h2{margin:0 0 4px;font-size:15px;font-weight:650;letter-spacing:-.01em}
.panel .sub{color:var(--muted);font-size:12.5px;margin:0 0 16px}
.section-label{display:flex;align-items:center;gap:10px;margin:0 0 14px}
.section-label .n{width:24px;height:24px;border-radius:7px;background:var(--brand-soft);color:var(--brand-ink);font-weight:700;font-size:12px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.section-label h2{margin:0;font-size:15px;font-weight:650}

/* fields */
.field{margin-bottom:13px;min-width:0}
.field>label{display:block;font-size:12px;color:var(--ink-2);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
.field textarea{resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(11,122,130,.13)}
.field input::placeholder{color:#aab2bc}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.err{color:var(--danger);font-size:12px;margin-top:4px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--brand);color:#fff;border:0;padding:9px 16px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:background .12s,opacity .12s;white-space:nowrap}
.btn:hover{background:var(--brand-2)}
.btn.sec{background:#fff;color:var(--ink-2);border:1px solid var(--line)}
.btn.sec:hover{background:var(--panel-2);border-color:#d8d4cb}
.btn.ghost{background:none;color:var(--muted);padding:6px 9px;font-weight:600}
.btn.ghost:hover{background:var(--line-2);color:var(--ink)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.danger{background:var(--danger)}.btn.danger:hover{background:#922f24}
.btn.danger.sec{background:#fff;color:var(--danger);border:1px solid var(--danger-soft)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

/* tables */
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th,table.data td{padding:11px 13px;border-bottom:1px solid var(--line-2);text-align:left;white-space:nowrap}
table.data th{background:var(--panel-2);font-weight:600;color:var(--ink-2);font-size:11.5px;letter-spacing:.02em;text-transform:uppercase;position:sticky;top:0}
table.data td.num,table.data th.num{text-align:right}
table.data tr:last-child td{border-bottom:0}
table.data tbody tr:hover td{background:var(--panel-2)}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.badge.success{background:var(--ok-soft);color:var(--ok);border-color:#cbe6d7}
.badge.ok{background:var(--brand-soft);color:var(--brand-ink);border-color:#c5e0e0}
.badge.warn{background:var(--warn-soft);color:var(--warn);border-color:#ecdcb4}
.badge.danger{background:var(--danger-soft);color:var(--danger);border-color:#eccdc6}
.badge.neutral{background:var(--line-2);color:var(--muted);border-color:var(--line)}
.badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* kpis */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.kpi{background:var(--panel-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:13px 15px}
.kpi .label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.kpi .value{font-size:21px;font-weight:700;margin-top:5px;letter-spacing:-.01em}
.kpi.hero{background:var(--brand);border-color:var(--brand)}
.kpi.hero .label{color:#bfe0e1}.kpi.hero .value{color:#fff}
.kpi.good .value{color:var(--ok)}.kpi.bad .value{color:var(--danger)}

/* ===== POTPIS: putna traka (journey strip) ===== */
.journey{margin:4px 0 2px}
.stops{display:flex;flex-wrap:wrap;align-items:center;gap:6px 8px;font-size:12.5px;color:var(--ink-2);margin-bottom:10px}
.stops .stop{font-weight:600}
.stops .arr{color:var(--muted);font-size:11px}
.stops .stop.base{color:var(--brand-ink);background:var(--brand-soft);border-radius:6px;padding:2px 8px}
.strip{display:flex;align-items:stretch;gap:3px;border-radius:10px;overflow:hidden;min-height:62px}
.strip .seg{position:relative;display:flex;flex-direction:column;justify-content:center;gap:2px;padding:8px 10px;min-width:64px;overflow:hidden;border-radius:7px}
.strip .seg .leg-route{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strip .seg .leg-km{font-size:11px;opacity:.85;font-variant-numeric:tabular-nums}
.strip .seg .leg-rev{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px}
.strip .seg.load{background:var(--brand);color:#fff}
.strip .seg.empty{background:repeating-linear-gradient(45deg,#eceae4,#eceae4 7px,#e3e0d8 7px,#e3e0d8 14px);color:var(--muted)}
.strip .seg.empty .leg-route{color:var(--ink-2)}
.legend{display:flex;gap:16px;margin-top:9px;font-size:11.5px;color:var(--muted)}
.legend i{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:5px}
.legend i.load{background:var(--brand)}
.legend i.empty{background:repeating-linear-gradient(45deg,#eceae4,#eceae4 4px,#e3e0d8 4px,#e3e0d8 8px);border:1px solid var(--line)}

/* legs editor cards */
.leg-card{border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;background:var(--panel-2)}
.leg-card.is-load{border-color:#c5e0e0;background:#fff;box-shadow:inset 3px 0 0 var(--brand)}
.leg-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.leg-head .seq{width:26px;height:26px;border-radius:7px;background:var(--ink);color:#fff;font-weight:700;font-size:12px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.leg-head .seq.load{background:var(--brand)}
.leg-head .from{font-size:12px;color:var(--muted);font-weight:600}
.leg-head .from b{color:var(--ink-2)}
.leg-head .sp{flex:1}
.leg-grid{display:grid;grid-template-columns:1.4fr .8fr 1fr;gap:12px}
.leg-order{margin-top:12px;padding-top:13px;border-top:1px dashed var(--line);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.leg-order .full{grid-column:1/-1}
.leg-order .rev3{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.add-leg{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}

/* analysis cells */
.analysis{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px}
.analysis .cell{background:var(--panel-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:12px 13px}
.analysis .cell .l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.02em}
.analysis .cell .v{font-size:18px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
.warnbox{background:var(--warn-soft);border:1px solid #ecdcb4;color:#6f4e08;padding:11px 14px;border-radius:var(--r-sm);margin-top:12px;font-size:13px}
.warnbox.bad{background:var(--danger-soft);border-color:#eccdc6;color:#7d2a20}
.okbox{background:var(--ok-soft);border:1px solid #cbe6d7;color:#16603b;padding:11px 14px;border-radius:var(--r-sm);margin-top:12px;font-size:13px}

/* filters */
.filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;align-items:end}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:14px}

/* utility */
.muted{color:var(--muted)}.right{text-align:right}.center{text-align:center}
.flex{display:flex;gap:10px;align-items:center}.flex.between{justify-content:space-between}.flex.wrap{flex-wrap:wrap}
.chart-box{position:relative;height:240px}
.empty-state{text-align:center;padding:46px 20px;color:var(--muted)}
.empty-state .big{font-size:34px;margin-bottom:8px;opacity:.5}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.chk{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2);cursor:pointer}
.chk input{width:auto}

/* toasts + modal */
#toasts{position:fixed;right:20px;bottom:20px;z-index:100;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:var(--r-sm);box-shadow:var(--shadow);font-size:13px;max-width:340px;animation:slidein .2s ease}
.toast.ok{background:#155f3b}.toast.err{background:#8c2e23}
@keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal-bg{position:fixed;inset:0;background:rgba(20,28,38,.5);display:flex;align-items:flex-start;justify-content:center;padding:42px 16px;z-index:60;overflow:auto}
.modal{background:#fff;border-radius:var(--radius);max-width:760px;width:100%;box-shadow:0 18px 50px rgba(0,0,0,.25)}
.modal header{padding:17px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal header h3{margin:0;font-size:16px;font-weight:650}
.modal .body{padding:22px}
.modal footer{padding:15px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px;flex-wrap:wrap}

/* per-row document menu */
.row-menu{position:fixed;z-index:90;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 34px rgba(20,28,38,.22);padding:6px;min-width:240px;max-width:320px}
.row-menu .rm-head{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:6px 10px 4px}
.row-menu .rm-sep{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);padding:8px 10px 3px;border-top:1px solid var(--line-2);margin-top:4px}
.row-menu button{display:block;width:100%;text-align:left;background:none;border:0;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink);font-family:inherit}
.row-menu button:hover{background:var(--brand-soft);color:var(--brand-ink)}

/* cloud badge */
.cloud{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--ink-2)}
.cloud .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.cloud.ok{color:var(--ok);border-color:#cbe6d7;background:var(--ok-soft)}.cloud.ok .dot{background:var(--ok)}
.cloud.syncing{color:var(--warn);border-color:#ecdcb4;background:var(--warn-soft)}.cloud.syncing .dot{background:var(--warn);animation:pulse 1s infinite}
.cloud.error{color:var(--danger);border-color:#eccdc6;background:var(--danger-soft)}.cloud.error .dot{background:var(--danger)}
.cloud.local .dot{background:#9aa3ad}
.cloud button{background:none;border:0;color:inherit;cursor:pointer;font:inherit;font-weight:600;text-decoration:underline;padding:0;margin-left:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

@media(max-width:900px){
  .sidebar{width:60px}.brand small,.who,.nav button span{display:none}.nav button{justify-content:center}.brand{font-size:0;padding:18px 0;text-align:center}
  .row,.row-3,.row-4,.grid-2,.leg-grid,.leg-order,.leg-order .rev3{grid-template-columns:1fr}
}

@media print{
  @page{size:A4;margin:14mm 12mm}
  .sidebar,.topbar,.nav,.btn,.filters,.toolbar,#toasts,.no-print,.add-leg{display:none!important}
  .app,.main,.content{display:block;padding:0;margin:0;max-width:100%}
  body{background:#fff;font-size:11pt;color:#000}
  .panel{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;margin-bottom:8mm}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">Balkan Avto<small>Isplativost ture</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="who" id="who"></div>
  </aside>
  <div class="main">
    <div class="topbar"><h1 id="viewTitle">Ture</h1><div class="flex"><span id="cloudBox"></span><div class="flex" id="topActions"></div></div></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toasts"></div>
<div id="modalRoot"></div>
<script>
/* =====================================================================
   BALKAN AVTO — alat za proveru isplativosti ture (standalone, localStorage)
   Tura = niz deonica (prazna vožnja + nalozi sa utovarom). Isplativost se
   računa za celu turu (zbir prihoda svih naloga − ukupan trošak svih km).
   Otvara se dvoklikom na fajl. Motor obračuna identičan ranijoj verziji.
   ===================================================================== */

/* ---------- enumi ---------- */
var TOUR_STATUS=['priprema','ponuda','prihvaćena','realizovana','otkazana'];
var STATUS_LABEL={priprema:'Priprema',ponuda:'Ponuda',prihvaćena:'Prihvaćena',realizovana:'Realizovana',otkazana:'Otkazana'};
var STATUS_TONE={priprema:'neutral',ponuda:'ok','prihvaćena':'ok',realizovana:'success',otkazana:'danger'};
var COST_CATEGORIES=['gorivo','putarine','vozač','amortizacija','održavanje','gume','osiguranje','registracija','lizing','administracija','carina','parking','trajekt','špedicija','ostalo'];
var COST_TYPES=['fixed_per_tour','per_total_km','per_loaded_km','per_empty_km','per_day','percent_of_revenue','manual_amount','fuel_formula'];
var COST_TYPE_LABEL={fixed_per_tour:'fiksno po turi',per_total_km:'po ukupnom km',per_loaded_km:'po punom km',per_empty_km:'po praznom km',per_day:'po danu',percent_of_revenue:'% od prihoda',manual_amount:'ručni iznos',fuel_formula:'formula goriva'};
var CALC_BASES=['total_km','loaded_km','empty_km','days','revenue','manual','fuel_consumption'];

/* ---------- format helperi ---------- */
function num(v){ if(v===''||v===null||v===undefined) return 0; if(typeof v==='number') return isFinite(v)?v:0;
  var s=String(v).trim(); if(s.indexOf(',')>-1&&s.indexOf('.')>-1) s=s.replace(/\./g,'').replace(',','.'); else s=s.replace(',','.');
  s=s.replace(/[^0-9.\-]/g,''); var n=parseFloat(s); return isFinite(n)?n:0; }
function r2(v){ v=Number(v); return isFinite(v)?Math.round((v+Number.EPSILON)*100)/100:0; }
function safeDivide(a,b){ b=Number(b); return (!b||!isFinite(b))?0:a/b; }
function fmtN(v,d){ v=Number(v)||0; var f=v.toFixed(d); var p=f.split('.'); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.'); return d>0?p.join(','):p[0]; }
function eur(v){ return fmtN(r2(v),2)+' €'; }
function eurKm(v){ return fmtN(r2(v),2)+' €/km'; }
function pct(v){ return fmtN(r2(v),2)+'%'; }
function km(v){ return fmtN(num(v),0)+' km'; }
function dateSr(v){ if(!v) return ''; var d=new Date(v); if(isNaN(d.getTime())) return String(v);
  return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+d.getFullYear()+'.'; }
function daysBetween(a,b){ if(!a||!b)return 0; var d1=new Date(a),d2=new Date(b); if(isNaN(d1)||isNaN(d2))return 0; var n=Math.round((d2-d1)/86400000)+1; return n>0?n:0; }
function escapeHtml(v){ return String(v===undefined||v===null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function nowIso(){ return new Date().toISOString(); }
function uid(p){ return p+'-'+Date.now().toString(36)+Math.floor(Math.random()*1000); }

/* ---------- localStorage baza ---------- */
var DB_KEY='balkan_avto_calc_v1';
var CLOUD_URL_KEY='balkan_avto_cloud_url';
var DB=null;
var CLOUD={url:'',rev:0,status:'local',ready:false,pending:false,pushTimer:null,pollTimer:null,lastErr:''};

function loadLocal(){ try{ var raw=localStorage.getItem(DB_KEY); DB=raw?JSON.parse(raw):null; }catch(e){ DB=null; } if(!DB){ DB=seed(); writeLocal(); } }
function writeLocal(){ try{ localStorage.setItem(DB_KEY,JSON.stringify(DB)); }catch(e){} }
function saveDB(){ writeLocal(); if(CLOUD.url&&CLOUD.ready) cloudSchedulePush(); }

/* ---- ZAJEDNIČKA BAZA: Google Sheets preko Apps Script Web App ---- */
function cloudGetUrl(){ try{return localStorage.getItem(CLOUD_URL_KEY)||'';}catch(e){return '';} }
function cloudSetUrl(u){ u=(u||'').trim(); try{localStorage.setItem(CLOUD_URL_KEY,u);}catch(e){} CLOUD.url=u; }
function setCloudStatus(s,msg){ CLOUD.status=s; CLOUD.lastErr=msg||''; renderCloud(); }
function renderCloud(){ var box=document.getElementById('cloudBox'); if(!box)return;
  if(!CLOUD.url){ box.innerHTML='<span class="cloud local" title="Podaci se čuvaju samo na ovom računaru"><span class="dot"></span>Lokalno <button onclick="navigate(\'admin\');setTimeout(function(){adminTab(\'cloud\');},30)">Poveži</button></span>'; return; }
  var lbl={syncing:'Sinhronizacija…',ok:'Cloud · sinhronizovano',error:'Greška sinhronizacije',local:'Lokalno'}[CLOUD.status]||'Cloud';
  box.innerHTML='<span class="cloud '+CLOUD.status+'" title="'+escapeHtml(CLOUD.lastErr||('rev '+CLOUD.rev))+'"><span class="dot"></span>'+lbl+' <button onclick="cloudSync()">'+(CLOUD.status==='error'?'Pokušaj':'↻')+'</button></span>'; }
function cloudApi(payload){ return fetch(CLOUD.url,{method:'POST',body:JSON.stringify(payload),redirect:'follow'}).then(function(r){return r.json();}); }
function cloudLoad(){ return fetch(CLOUD.url+(CLOUD.url.indexOf('?')>-1?'&':'?')+'action=load&t='+Date.now(),{redirect:'follow'}).then(function(r){return r.json();}); }
function cloudRevGet(){ return fetch(CLOUD.url+(CLOUD.url.indexOf('?')>-1?'&':'?')+'action=rev&t='+Date.now(),{redirect:'follow'}).then(function(r){return r.json();}); }
function cloudInit(){ CLOUD.url=cloudGetUrl(); if(!CLOUD.url){ CLOUD.ready=true; setCloudStatus('local'); return; }
  setCloudStatus('syncing');
  cloudLoad().then(function(res){
    if(res&&res.ok&&res.rev>0&&res.db){ DB=res.db; CLOUD.rev=res.rev; writeLocal(); CLOUD.ready=true; setCloudStatus('ok'); rerenderData(); startPolling(); }
    else if(res&&res.ok){ CLOUD.rev=0; CLOUD.ready=true; cloudPush(true).then(function(){startPolling();}); }
    else { CLOUD.ready=true; setCloudStatus('error',(res&&res.error)||'nevažeći odgovor servera'); }
  }).catch(function(e){ CLOUD.ready=true; setCloudStatus('error',String(e.message||e)); });
}
function cloudSchedulePush(){ CLOUD.pending=true; if(CLOUD.pushTimer)clearTimeout(CLOUD.pushTimer); CLOUD.pushTimer=setTimeout(function(){cloudPush(false);},1200); }
function cloudPush(force){ if(!CLOUD.url)return Promise.resolve(); setCloudStatus('syncing');
  return cloudApi({action:'save',baseRev:CLOUD.rev,force:!!force,db:DB}).then(function(res){
    if(res&&res.ok){ CLOUD.rev=res.rev; CLOUD.pending=false; setCloudStatus('ok'); }
    else if(res&&res.conflict){ if(res.db){ DB=res.db; CLOUD.rev=res.rev; writeLocal(); rerenderData(); }
      CLOUD.pending=false; setCloudStatus('ok'); toast('Baza je izmenjena na drugom mestu — povučena je najnovija verzija. Proveri i sačuvaj ponovo ako treba.','err'); }
    else setCloudStatus('error',(res&&res.error)||'neuspeo upis');
  }).catch(function(e){ setCloudStatus('error',String(e.message||e)); });
}
function cloudSync(){ if(!CLOUD.url){ toast('Cloud nije povezan.','err'); return; }
  if(CLOUD.pending){ cloudPush(false); return; }
  setCloudStatus('syncing'); cloudLoad().then(function(res){ if(res&&res.ok&&res.db){ DB=res.db; CLOUD.rev=res.rev; writeLocal(); rerenderData(); setCloudStatus('ok'); toast('Sinhronizovano.','ok'); } else setCloudStatus('error',(res&&res.error)||'greška'); }).catch(function(e){ setCloudStatus('error',String(e.message||e)); }); }
function startPolling(){ if(CLOUD.pollTimer)clearInterval(CLOUD.pollTimer); CLOUD.pollTimer=setInterval(function(){
  if(!CLOUD.url||CLOUD.pending)return; cloudRevGet().then(function(res){ if(res&&res.ok&&res.rev>CLOUD.rev){ cloudLoad().then(function(r){ if(r&&r.ok&&r.db){ DB=r.db; CLOUD.rev=r.rev; writeLocal(); setCloudStatus('ok'); rerenderData(); } }); } }).catch(function(){}); },10000); }
function rerenderData(){ renderWho(); if(APP.view==='ture'){ try{ loadTours(); }catch(e){} } }
function table(t){ return DB[t]||(DB[t]=[]); }
function byId(t,field,id){ return table(t).filter(function(r){return r[field]===id;})[0]||null; }
function theTruck(){ return table('trucks')[0]||null; }
function theDriver(){ return table('drivers')[0]||null; }
function genTourNumber(){ var y=new Date().getFullYear(); var n=table('tours').filter(function(t){return (t.tour_number||'').indexOf('T-'+y)===0;}).length+1; return 'T-'+y+'-'+('00'+n).slice(-3); }

function isoDaysAgo(n){ var d=new Date(); d.setDate(d.getDate()-n); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
/* =====================================================================
   MOTOR OBRAČUNA (zadržan — radi na zbirnim km/danima/prihodu cele ture)
   ===================================================================== */
function aggregateLegs(legs){ legs=legs||[]; var lk=0,ek=0,fr=0,fs=0,ot=0,nalozi=0;
  legs.forEach(function(l){ var k=num(l.km);
    if(l.type==='nalog'){ lk+=k; nalozi++; fr+=num(l.freight_revenue_eur); fs+=num(l.fuel_surcharge_eur); ot+=num(l.other_revenue_eur); }
    else ek+=k; });
  return {loaded_km:r2(lk),empty_km:r2(ek),total_km:r2(lk+ek),freight:r2(fr),fuel:r2(fs),other:r2(ot),nalozi:nalozi}; }
function chainLegs(base,legs){ var from=base||''; return (legs||[]).map(function(l){ var o=Object.assign({},l); o.from=from; from=l.to||''; return o; }); }

function computeCostLine(item,ctx){
  var rate=num(item.rate_eur!==undefined?item.rate_eur:item.default_rate); var qty=0,amount=0;
  switch(item.type){
    case 'fixed_per_tour': qty=1; amount=rate; break;
    case 'per_total_km': qty=ctx.total_km; amount=ctx.total_km*rate; break;
    case 'per_loaded_km': qty=ctx.loaded_km; amount=ctx.loaded_km*rate; break;
    case 'per_empty_km': qty=ctx.empty_km; amount=ctx.empty_km*rate; break;
    case 'per_day': qty=ctx.days; amount=ctx.days*rate; break;
    case 'percent_of_revenue': qty=ctx.total_revenue; amount=ctx.total_revenue*rate/100; break;
    case 'manual_amount': qty=1; amount=num(item.manual_amount!==undefined?item.manual_amount:rate); break;
    case 'fuel_formula':
      var fl=ctx.loaded_km*ctx.consumption_loaded/100, fe=ctx.empty_km*ctx.consumption_empty/100;
      qty=fl+fe; amount=qty*ctx.fuel_price; break;
    default: qty=0; amount=num(item.manual_amount)||0;
  }
  return {quantity:r2(qty),rate:r2(rate),amount:r2(amount)};
}
function buildCostLinesFromActive(truck,driver){
  return table('costItems').filter(function(c){return c.is_active===true||num(c.is_active)===1;}).map(function(c){
    var rate=num(c.default_rate);
    if(truck){ if(c.category==='amortizacija')rate=num(truck.depreciation_per_km_eur)||rate;
      if(c.category==='održavanje')rate=num(truck.maintenance_per_km_eur)||rate;
      if(c.category==='gume')rate=num(truck.tires_per_km_eur)||rate;
      if(c.category==='osiguranje')rate=num(truck.insurance_per_day_eur)||rate;
      if(c.category==='registracija')rate=num(truck.registration_per_day_eur)||rate;
      if(c.category==='lizing')rate=num(truck.leasing_per_day_eur)||rate; }
    if(driver&&c.category==='vozač'){ if(/dnevnic/i.test(c.name))rate=num(driver.default_daily_allowance_eur)||rate;
      if(/plata/i.test(c.name))rate=num(driver.default_salary_per_day_eur)||rate; }
    return {cost_item_id:c.cost_item_id,name:c.name,category:c.category,type:c.type,unit:c.unit,
      default_rate:rate,rate_eur:rate,calculation_base:c.calculation_base,manually_overridden:false};
  });
}
function calculateTourProfitability(tour,costItems,truck,driver){
  var s=DB.settings;
  var loaded_km=num(tour.loaded_km), empty_km=num(tour.empty_km), total_km=loaded_km+empty_km;
  var days=num(tour.days)||1;
  var empty_km_percent=safeDivide(empty_km,total_km)*100;
  var freight=num(tour.freight_revenue_eur), fuelSur=num(tour.fuel_surcharge_eur), other=num(tour.other_revenue_eur);
  var total_revenue=freight+fuelSur+other;
  var ctx={loaded_km:loaded_km,empty_km:empty_km,total_km:total_km,days:days,total_revenue:total_revenue,
    consumption_loaded:truck?num(truck.avg_consumption_loaded_l_100km):30,
    consumption_empty:truck?num(truck.avg_consumption_empty_l_100km):25,
    fuel_price:num(s.fuel_price_eur_per_l)||1.45};
  var lines=[], total_cost=0;
  (costItems||[]).forEach(function(item){
    if(item.manually_overridden&&item.amount_eur!==undefined){
      var amt=r2(num(item.amount_eur));
      lines.push({cost_item_id:item.cost_item_id,name:item.name,category:item.category,type:item.type,unit:item.unit,
        quantity:r2(num(item.quantity)),rate_eur:r2(num(item.rate_eur)),amount_eur:amt,
        calculation_base:item.calculation_base,auto_calculated:false,manually_overridden:true,note:item.note||''});
      total_cost+=amt; return;
    }
    var calc=computeCostLine(item,ctx);
    lines.push({cost_item_id:item.cost_item_id,name:item.name,category:item.category,type:item.type,unit:item.unit,
      quantity:calc.quantity,rate_eur:calc.rate,amount_eur:calc.amount,calculation_base:item.calculation_base,
      auto_calculated:true,manually_overridden:false,note:item.note||''});
    total_cost+=calc.amount;
  });
  total_cost=r2(total_cost);
  var gross_profit=r2(total_revenue-total_cost);
  var profit_margin=total_revenue>0?r2(safeDivide(gross_profit,total_revenue)*100):0;
  var target=num(tour.target_profit_margin_percent)||num(s.default_profit_margin_percent)||0;
  var suggested=(target>0&&target<100)?r2(safeDivide(total_cost,(1-target/100))):total_cost;
  var vat_rate=(tour.vat_rate_percent===undefined||tour.vat_rate_percent==='')?num(s.default_vat_rate):num(tour.vat_rate_percent);
  var vat_amount=r2(total_revenue*vat_rate/100), total_with_vat=r2(total_revenue+vat_amount);
  return {loaded_km:r2(loaded_km),empty_km:r2(empty_km),total_km:r2(total_km),empty_km_percent:r2(empty_km_percent),days:days,
    total_revenue_eur:r2(total_revenue),total_cost_eur:total_cost,gross_profit_eur:gross_profit,profit_margin_percent:profit_margin,
    revenue_per_total_km_eur:r2(safeDivide(total_revenue,total_km)),cost_per_total_km_eur:r2(safeDivide(total_cost,total_km)),
    profit_per_total_km_eur:r2(safeDivide(gross_profit,total_km)),
    revenue_per_loaded_km_eur:r2(safeDivide(total_revenue,loaded_km)),cost_per_loaded_km_eur:r2(safeDivide(total_cost,loaded_km)),
    profit_per_loaded_km_eur:r2(safeDivide(gross_profit,loaded_km)),
    target_profit_margin_percent:r2(target),suggested_price_eur:suggested,minimum_price_eur:r2(total_cost),
    price_below_cost_warning:suggested<total_cost,vat_rate_percent:r2(vat_rate),vat_amount_eur:vat_amount,
    total_with_vat_eur:total_with_vat,profitability_status:profitabilityStatus(profit_margin,target),cost_lines:lines};
}
function profitabilityStatus(margin,target){ target=target||0;
  if(margin<0) return {key:'neisplativa',label:'Neisplativa',tone:'danger'};
  if(margin>=target+5) return {key:'odlicna',label:'Odlična',tone:'success'};
  if(margin>=target) return {key:'isplativa',label:'Isplativa',tone:'ok'};
  return {key:'pregovor',label:'Za pregovor',tone:'warn'}; }

/* ---------- čuvanje ture + SNAPSHOT troškova ---------- */
function saveTourCore(tour){
  var truck=theTruck(), driver=theDriver();
  var base=tour.base_location||DB.settings.base_location||'';
  var legs=chainLegs(base,tour.legs||[]);
  var agg=aggregateLegs(legs);
  tour.loaded_km=agg.loaded_km; tour.empty_km=agg.empty_km;
  tour.freight_revenue_eur=agg.freight; tour.fuel_surcharge_eur=agg.fuel; tour.other_revenue_eur=agg.other;
  if(!num(tour.days)) tour.days=daysBetween(tour.start_date,tour.end_date)||1;
  var inputLines=(tour.cost_lines&&tour.cost_lines.length)?tour.cost_lines:buildCostLinesFromActive(truck,driver);
  var calc=calculateTourProfitability(tour,inputLines,truck,driver);
  var isNew=!tour.tour_id;
  var tourId=tour.tour_id||uid('TOUR'); var tourNumber=tour.tour_number||(isNew?genTourNumber():tour.tour_number);
  // snapshot naloga (klijent ime, redni broj)
  var legSnap=legs.map(function(l,i){ var c=l.client_id?byId('clients','client_id',l.client_id):null;
    return {seq:i+1,from:l.from||'',to:l.to||'',km:num(l.km),type:l.type==='nalog'?'nalog':'prazna',
      client_id:l.client_id||'',client_name_snapshot:c?c.client_name:(l.client_name_snapshot||''),
      cargo_description:l.cargo_description||'',cargo_weight_kg:num(l.cargo_weight_kg),
      freight_revenue_eur:num(l.freight_revenue_eur),fuel_surcharge_eur:num(l.fuel_surcharge_eur),other_revenue_eur:num(l.other_revenue_eur),
      revenue_eur:r2(num(l.freight_revenue_eur)+num(l.fuel_surcharge_eur)+num(l.other_revenue_eur)),
      quote_number:l.quote_number||'',order_number:l.order_number||''}; });
  var routeText=base+(legSnap.length?' → '+legSnap.map(function(l){return l.to;}).join(' → '):'');
  var rec={tour_id:tourId,tour_number:tourNumber,status:tour.status||'priprema',
    base_location:base,route_text:routeText,legs:legSnap,nalozi_count:agg.nalozi,
    start_date:tour.start_date||'',end_date:tour.end_date||'',days:num(tour.days)||calc.days,
    truck_id:truck?truck.truck_id:'',truck_plate_snapshot:truck?truck.plate_number:'',trailer_plate_snapshot:truck?truck.trailer_plate_number:'',
    driver_id:driver?driver.driver_id:'',driver_name_snapshot:driver?driver.full_name:'',
    loaded_km:calc.loaded_km,empty_km:calc.empty_km,total_km:calc.total_km,empty_km_percent:calc.empty_km_percent,
    freight_revenue_eur:agg.freight,fuel_surcharge_eur:agg.fuel,other_revenue_eur:agg.other,
    total_revenue_eur:calc.total_revenue_eur,total_cost_eur:calc.total_cost_eur,gross_profit_eur:calc.gross_profit_eur,
    profit_margin_percent:calc.profit_margin_percent,revenue_per_total_km_eur:calc.revenue_per_total_km_eur,
    cost_per_total_km_eur:calc.cost_per_total_km_eur,profit_per_total_km_eur:calc.profit_per_total_km_eur,
    revenue_per_loaded_km_eur:calc.revenue_per_loaded_km_eur,cost_per_loaded_km_eur:calc.cost_per_loaded_km_eur,
    profit_per_loaded_km_eur:calc.profit_per_loaded_km_eur,target_profit_margin_percent:calc.target_profit_margin_percent,
    suggested_price_eur:calc.suggested_price_eur,minimum_price_eur:calc.minimum_price_eur,vat_rate_percent:calc.vat_rate_percent,
    vat_amount_eur:calc.vat_amount_eur,total_with_vat_eur:calc.total_with_vat_eur,payment_terms_days:num(tour.payment_terms_days)||num(DB.settings.default_payment_terms_days),
    note:tour.note||'',cancellation_reason:tour.cancellation_reason||'',
    created_at:tour.created_at||nowIso(),updated_at:nowIso()};
  if(isNew) table('tours').push(rec); else { var i=table('tours').findIndex(function(t){return t.tour_id===tourId;}); if(i>-1)table('tours')[i]=rec; else table('tours').push(rec); }
  writeTourCosts(tourId,calc.cost_lines);
  saveDB();
  return {ok:true,tour_id:tourId,calc:calc};
}
function writeTourCosts(tourId,lines){
  DB.tourCosts=table('tourCosts').filter(function(c){return c.tour_id!==tourId;});
  lines.forEach(function(l,idx){ DB.tourCosts.push({tour_cost_id:tourId+'-C'+('00'+(idx+1)).slice(-3),tour_id:tourId,
    cost_item_id:l.cost_item_id||'',cost_name_snapshot:l.name||'',category_snapshot:l.category||'',type_snapshot:l.type||'',
    unit_snapshot:l.unit||'',quantity:l.quantity,rate_eur:l.rate_eur,amount_eur:l.amount_eur,
    calculation_base_snapshot:l.calculation_base||'',auto_calculated:l.auto_calculated,manually_overridden:l.manually_overridden,
    note:l.note||'',created_at:nowIso(),updated_at:nowIso()}); });

function refreshTourCosts(tourId){
  var t=byId('tours','tour_id',tourId); if(!t) return;
  var truck=theTruck(), driver=theDriver();
  var lines=buildCostLinesFromActive(truck,driver); var calc=calculateTourProfitability(t,lines,truck,driver);
  writeTourCosts(tourId,calc.cost_lines);
  Object.assign(t,{total_cost_eur:calc.total_cost_eur,gross_profit_eur:calc.gross_profit_eur,profit_margin_percent:calc.profit_margin_percent,
    cost_per_total_km_eur:calc.cost_per_total_km_eur,profit_per_total_km_eur:calc.profit_per_total_km_eur,
    cost_per_loaded_km_eur:calc.cost_per_loaded_km_eur,profit_per_loaded_km_eur:calc.profit_per_loaded_km_eur,updated_at:nowIso()});
  saveDB();
}

/* =====================================================================

   ===================================================================== */
function tourMatchesText(t,q){ if(!q) return true; q=String(q).toLowerCase();
  if((t.tour_number||'').toLowerCase().indexOf(q)>-1) return true;
  if((t.route_text||'').toLowerCase().indexOf(q)>-1) return true;
  return (t.legs||[]).some(function(l){ return ((l.from||'')+' '+(l.to||'')+' '+(l.client_name_snapshot||'')+' '+(l.cargo_description||'')).toLowerCase().indexOf(q)>-1; }); }
function tourDate(t){ var s=t.start_date||t.created_at; if(!s)return null; var d=new Date(s); return isNaN(d.getTime())?null:d; }
function getFilteredTours(f){ f=f||{};
  var rows=table('tours').filter(function(t){
    if(f.status&&t.status!==f.status) return false;
    if(f.client_id&&!(t.legs||[]).some(function(l){return l.client_id===f.client_id;})) return false;
    if(f.q&&!tourMatchesText(t,f.q)) return false;
    if(f.minMargin!==undefined&&f.minMargin!==''&&num(t.profit_margin_percent)<num(f.minMargin)) return false;
    if(f.profOnly){ var st=profitabilityStatus(num(t.profit_margin_percent),num(t.target_profit_margin_percent)).key; if(st==='neisplativa'||st==='pregovor') return false; }
    if(f.lossOnly&&num(t.gross_profit_eur)>=0) return false;
    if(f.dateFrom||f.dateTo){ var d=tourDate(t);
      if(d){ if(f.dateFrom&&d<new Date(f.dateFrom+'T00:00:00')) return false; if(f.dateTo&&d>new Date(f.dateTo+'T23:59:59')) return false; }
      else if(f.dateFrom||f.dateTo) return false; }
    return true;
  });
  var sort=f.sort||'date_desc';
  rows.sort(function(a,b){
    if(sort==='profit_desc') return num(b.gross_profit_eur)-num(a.gross_profit_eur);
    if(sort==='profit_asc') return num(a.gross_profit_eur)-num(b.gross_profit_eur);
    if(sort==='margin_desc') return num(b.profit_margin_percent)-num(a.profit_margin_percent);
    return new Date(b.created_at||0)-new Date(a.created_at||0);
  });
  return rows;
}
function summarize(tours){ var k={count:tours.length,revenue:0,cost:0,profit:0,mSum:0,mN:0,emptyKm:0,totalKm:0,loss:0};
  tours.forEach(function(t){ k.revenue+=num(t.total_revenue_eur); k.cost+=num(t.total_cost_eur); k.profit+=num(t.gross_profit_eur);
    if(num(t.total_revenue_eur)>0){k.mSum+=num(t.profit_margin_percent);k.mN++;} if(num(t.gross_profit_eur)<0)k.loss++;
    k.emptyKm+=num(t.empty_km); k.totalKm+=num(t.total_km); });
  return {count:k.count,revenue:r2(k.revenue),cost:r2(k.cost),profit:r2(k.profit),loss:k.loss,
    avgMargin:r2(safeDivide(k.mSum,k.mN)),avgProfitPerKm:r2(safeDivide(k.profit,k.totalKm)),
    emptyKm:r2(k.emptyKm),totalKm:r2(k.totalKm),emptyKmPercent:r2(safeDivide(k.emptyKm,k.totalKm)*100)}; }
function costByCategory(tours){ var ids={}; tours.forEach(function(t){ids[t.tour_id]=true;});
  var rows=table('tourCosts').filter(function(c){return ids[c.tour_id];}); var map={};
  rows.forEach(function(c){ var cat=c.category_snapshot||'ostalo'; map[cat]=(map[cat]||0)+num(c.amount_eur); });
  var total=0; Object.keys(map).forEach(function(k){total+=map[k];});
  return Object.keys(map).map(function(k){return {category:k,amount:r2(map[k]),percent:r2(safeDivide(map[k],total)*100)};}).sort(function(a,b){return b.amount-a.amount;}); }

function journeyStrip(legs,base){ legs=legs||[]; if(!legs.length) return '<p class="muted">Nema deonica.</p>';
  var stops=[base||legs[0].from||'?']; legs.forEach(function(l){stops.push(l.to||'?');});
  var stopsHtml='<div class="stops">'+stops.map(function(s,i){var isBase=(i===0||i===stops.length-1)&&base&&s===base;
    return '<span class="stop'+(isBase?' base':'')+'">'+escapeHtml(s)+'</span>'+(i<stops.length-1?'<span class="arr">→</span>':'');}).join('')+'</div>';
  var maxKm=Math.max.apply(null,legs.map(function(l){return num(l.km)||1;}));
  var segs=legs.map(function(l){ var loaded=l.type==='nalog'; var grow=Math.max(.4,(num(l.km)/maxKm));
    var rev=loaded?(num(l.freight_revenue_eur)+num(l.fuel_surcharge_eur)+num(l.other_revenue_eur)):0;
    return '<div class="seg '+(loaded?'load':'empty')+'" style="flex-grow:'+grow.toFixed(2)+'" title="'+escapeHtml((l.from||'')+' → '+(l.to||''))+'">'+
      '<span class="leg-route">'+escapeHtml(l.to||'')+'</span>'+
      '<span class="leg-km">'+km(l.km)+(loaded?' · pun':' · prazan')+'</span>'+
      (loaded?'<span class="leg-rev">'+eur(rev)+'</span>':'')+'</div>'; }).join('');
  return '<div class="journey">'+stopsHtml+'<div class="strip">'+segs+'</div>'+
    '<div class="legend"><span><i class="load"></i>nalog (utovar)</span><span><i class="empty"></i>prazna vožnja</span></div></div>'; }

function ntTourObj(){ var legs=chainLegs(NT.data.base_location,NT.legs); var agg=aggregateLegs(legs);

    target_profit_margin_percent:NT.data.target_profit_margin_percent,vat_rate_percent:NT.data.vat_rate_percent,_agg:agg}; }
function ntRecalc(){ if(!NT)return; ntCollectBasics();

  calc.cost_lines.forEach(function(l,i){ var el=document.getElementById('cl_amt_'+i); if(el)el.textContent=eur(l.amount_eur);

  else warn='<div class="okbox">✓ '+st.label+' — marža '+pct(c.profit_margin_percent)+' (cilj '+pct(c.target_profit_margin_percent)+').</div>';

function adminCloud(){ var url=cloudGetUrl();
  var statusLine=CLOUD.url?('<p class="sub">Status: <b>'+({syncing:'sinhronizacija…',ok:'povezano i sinhronizovano',error:'greška — '+escapeHtml(CLOUD.lastErr),local:'lokalno'}[CLOUD.status]||CLOUD.status)+'</b> · rev '+CLOUD.rev+'</p>'):'<p class="sub">Trenutno: <b>lokalni režim</b> (podaci samo na ovom računaru).</p>';
  document.getElementById('adminBody').innerHTML='<div class="panel"><h2>Zajednička baza (Google Sheets)</h2>'+
    '<p class="sub">Nalepi URL Apps Script Web App-a (deploy „Anyone"). Svi koji koriste isti URL dele istu bazu. Podaci se keširaju lokalno i sinhronizuju automatski (na ~10 s).</p>'+statusLine+
    field('Apps Script Web App URL','<input id="cloud_url" autocomplete="off" placeholder="https://script.google.com/macros/s/.../exec" value="'+escapeHtml(url)+'">')+
    '<div class="btn-row"><button class="btn" onclick="cloudConnect()">Poveži i učitaj</button>'+
    '<button class="btn sec" onclick="cloudTest()">Testiraj vezu</button>'+
    (CLOUD.url?'<button class="btn sec" onclick="cloudSync()">Povuci sa cloud-a</button><button class="btn sec" onclick="cloudPush(true)">Pošalji na cloud</button><button class="btn danger sec" onclick="cloudDisconnect()">Prekini vezu</button>':'')+
    '</div>'+
    '<p class="muted" style="margin-top:14px;font-size:12.5px">⚠ Pri konfliktu (dvoje sačuvalo istovremeno) povlači se najnovija verzija sa servera — proveri i sačuvaj ponovo. Lokalni keš ostaje, pa aplikacija radi i bez interneta i sinhronizuje kad se veza vrati.</p>'+
  '</div>'; }
function cloudConnect(){ var u=val('cloud_url').trim(); if(!u){toast('Unesi URL.','err');return;} if(!/^https:\/\/script\.google\.com\/.*\/exec/.test(u)){ if(!confirm('URL ne izgleda kao Apps Script „…/exec". Nastaviti?'))return; }
  cloudSetUrl(u); CLOUD.ready=false; CLOUD.rev=0; toast('Povezivanje…','ok'); cloudInit(); setTimeout(function(){adminTab('cloud');},800); }
function cloudTest(){ var u=val('cloud_url').trim()||CLOUD.url; if(!u){toast('Unesi URL.','err');return;}
  toast('Testiranje…','ok'); fetch(u+(u.indexOf('?')>-1?'&':'?')+'action=rev&t='+Date.now(),{redirect:'follow'}).then(function(r){return r.json();}).then(function(res){ if(res&&res.ok)toast('Veza ispravna. Trenutni rev: '+res.rev,'ok'); else toast('Odgovor bez „ok" — proveri deploy/dozvole.','err'); }).catch(function(e){ toast('Neuspela veza: '+(e.message||e),'err'); }); }
function cloudDisconnect(){ if(!confirm('Prekinuti vezu sa cloud bazom? Aplikacija ostaje na lokalnim podacima.'))return; if(CLOUD.pollTimer)clearInterval(CLOUD.pollTimer); cloudSetUrl(''); CLOUD.rev=0; CLOUD.status='local'; renderCloud(); toast('Veza prekinuta — lokalni režim.','ok'); adminTab('cloud'); }

  defs.forEach(function(k){c[k]=val('cl_'+k);}); c.payment_terms_days=num(val('cl_payment_terms_days')); c.active=(val('cl_active')==='true');
  if(!id){ var n=table('clients').filter(function(x){return (x.client_id||'').indexOf('CLIENT-')===0;}).length+1; c.client_id='CLIENT-'+('000'+n).slice(-4); table('clients').push(c); }
  saveDB(); toast('Klijent sačuvan.','ok'); closeModal(); adminTab('clients'); }

function adminCosts(){ var data=table('costItems');
  var rows=data.map(function(c){return '<tr><td>'+escapeHtml(c.name)+'</td><td>'+escapeHtml(c.category)+'</td><td class="muted" style="font-size:12px">'+escapeHtml(COST_TYPE_LABEL[c.type]||c.type)+'</td><td>'+escapeHtml(c.unit)+'</td><td class="num">'+fmtN(num(c.default_rate),2)+'</td>'+
    '<td>'+((c.is_active===true||num(c.is_active)===1)?badge('aktivna','success'):badge('neaktivna','neutral'))+'</td><td>'+((c.is_mandatory===true||num(c.is_mandatory)===1)?badge('obavezna','ok'):'')+'</td>'+
    '<td><button class="btn sm sec" onclick="editCost(\''+c.cost_item_id+'\')">Izmeni</button></td></tr>';}).join('');
  document.getElementById('adminBody').innerHTML='<div class="panel"><div class="flex between"><h2>Troškovne stavke</h2><button class="btn" onclick="editCost()">+ Nova stavka</button></div><p class="sub">Aktivne stavke ulaze u obračun svake nove ture. Postojeće ture zadržavaju snapshot dok se ne „osveže".</p><div class="table-wrap"><table class="data"><thead><tr><th>Naziv</th><th>Kategorija</th><th>Tip obračuna</th><th>Jedinica</th><th class="num">Stopa</th><th>Aktivna</th><th>Obavezna</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'; }
function editCost(id){ var c=id?byId('costItems','cost_item_id',id):{is_active:true,is_mandatory:false};
  var body='<div class="row">'+field('Naziv*',inp('ci_name',c.name))+field('Kategorija',selectHtml('ci_category',COST_CATEGORIES,c.category))+'</div>'+
    '<div class="row">'+field('Tip obračuna',selectHtml('ci_type',COST_TYPES.map(function(t){return {value:t,label:COST_TYPE_LABEL[t]};}),c.type))+field('Osnova',selectHtml('ci_base',CALC_BASES,c.calculation_base))+'</div>'+
    '<div class="row">'+field('Jedinica',inp('ci_unit',c.unit))+field('Stopa',inp('ci_rate',c.default_rate))+'</div>'+
    '<div class="row">'+field('Obavezna',selectHtml('ci_mand',[{value:'true',label:'Da'},{value:'false',label:'Ne'}],String(c.is_mandatory===true||num(c.is_mandatory)===1)))+field('Aktivna',selectHtml('ci_active',[{value:'true',label:'Da'},{value:'false',label:'Ne'}],String(!(c.is_active===false||num(c.is_active)===0))))+'</div>'+field('Napomena',inp('ci_note',c.note));
  openModal((id?'Izmena':'Nova')+' troškovna stavka',body,'<button class="btn" onclick="saveCost(\''+(id||'')+'\')">Sačuvaj</button>'); }
function saveCost(id){ if(!val('ci_name')){toast('Naziv je obavezan.','err');return;}
  var obj=id?byId('costItems','cost_item_id',id):{created_at:nowIso(),sort_order:table('costItems').length+1};
  obj.name=val('ci_name'); obj.category=val('ci_category'); obj.type=val('ci_type'); obj.calculation_base=val('ci_base'); obj.unit=val('ci_unit');
  obj.default_rate=num(val('ci_rate')); obj.is_mandatory=val('ci_mand')==='true'; obj.is_active=val('ci_active')==='true'; obj.note=val('ci_note'); obj.updated_at=nowIso();
  if(!id){ var n=table('costItems').length+1; obj.cost_item_id='COST-'+('000'+n).slice(-4); table('costItems').push(obj); }
  saveDB(); toast('Sačuvano. Stavka je odmah aktivna u obračunu novih tura.','ok'); closeModal(); adminTab('costs'); }

function resetDemo(){ if(confirm('Obrisati sve podatke i vratiti demo primer?')){ try{localStorage.removeItem(DB_KEY);}catch(e){} loadLocal(); writeLocal(); if(CLOUD.url&&CLOUD.ready)cloudPush(true); renderWho(); renderCloud(); navigate('ture'); toast('Demo resetovan.','ok'); } }
</script>
