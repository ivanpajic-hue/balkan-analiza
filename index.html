<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Balkan Avto — Isplativost tura</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f6f7f9;--panel:#fff;--ink:#1c2430;--muted:#6b7685;--line:#e6e9ef;
  --brand:#0f4c81;--brand-2:#1769aa;--ok:#1f9d57;--warn:#c98a00;--danger:#c0392b;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);--radius:10px;--r-sm:7px;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
a{color:var(--brand-2);text-decoration:none}
.app{display:flex;min-height:100vh}
.sidebar{width:236px;background:#0d2438;color:#cdd7e2;flex-shrink:0;display:flex;flex-direction:column}
.sidebar .logo{padding:18px;font-weight:700;font-size:16px;color:#fff}
.sidebar .logo small{display:block;font-weight:400;font-size:11px;color:#7e93a8;margin-top:3px}
.nav{padding:6px}
.nav button{width:100%;text-align:left;background:none;border:0;color:#cdd7e2;padding:10px 14px;border-radius:var(--r-sm);cursor:pointer;font-size:14px;display:flex;gap:9px}
.nav button:hover{background:rgba(255,255,255,.06)}
.nav button.active{background:var(--brand);color:#fff;font-weight:600}
.sidebar .who{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#9fb0c2}
.sidebar .who b{color:#fff}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.topbar h1{font-size:18px;margin:0}
.content{padding:22px;max-width:1300px;width:100%}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.panel h2{margin:0 0 14px;font-size:15px}
.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(auto-fill,minmax(168px,1fr))}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.kpi .label{font-size:12px;color:var(--muted)}.kpi .value{font-size:21px;font-weight:700;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--brand);color:#fff;border:0;padding:9px 15px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{background:var(--brand-2)}.btn.sec{background:#eef1f5;color:var(--ink)}.btn.sec:hover{background:#e2e7ee}
.btn.ghost{background:none;color:var(--brand-2);padding:6px 8px}.btn.sm{padding:5px 10px;font-size:12px}.btn.danger{background:var(--danger)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:14px;font-family:inherit;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(23,105,170,.12)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.err{color:var(--danger);font-size:12px;margin-top:4px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--radius)}
table.data{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
table.data th,table.data td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
table.data th{background:#f3f5f8;font-weight:600;position:sticky;top:0}
table.data td.num,table.data th.num{text-align:right}
table.data tr:hover td{background:#fafbfd}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid transparent}
.badge.success{background:#e7f6ee;color:var(--ok);border-color:#bfe6cf}.badge.ok{background:#e8f1fb;color:var(--brand-2);border-color:#c4ddf5}
.badge.warn{background:#fdf3df;color:var(--warn);border-color:#f3dfac}.badge.danger{background:#fcebe9;color:var(--danger);border-color:#f3c6c1}
.badge.neutral{background:#eef1f5;color:var(--muted);border-color:#dde2ea}
.stepper{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.stepper .step{flex:1;min-width:88px;text-align:center;padding:9px 6px;border-radius:var(--r-sm);background:#eef1f5;color:var(--muted);font-size:12px;font-weight:600;border:1px solid var(--line)}
.stepper .step.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.stepper .step.done{background:#e7f6ee;color:var(--ok);border-color:#bfe6cf}
.filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;align-items:end}
#toasts{position:fixed;right:18px;bottom:18px;z-index:100;display:flex;flex-direction:column;gap:8px}
.toast{background:#1c2430;color:#fff;padding:11px 15px;border-radius:var(--r-sm);box-shadow:var(--shadow);font-size:13px;max-width:340px}
.toast.ok{background:#13633a}.toast.err{background:#9e2a20}
.modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow:auto}
.modal{background:#fff;border-radius:var(--radius);max-width:780px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal header{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal header h3{margin:0;font-size:16px}.modal .body{padding:20px}
.modal footer{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.analysis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.analysis .cell{background:#f8fafc;border:1px solid var(--line);border-radius:var(--r-sm);padding:12px}
.analysis .cell .l{font-size:11px;color:var(--muted)}.analysis .cell .v{font-size:18px;font-weight:700;margin-top:3px}
.warnbox{background:#fdf3df;border:1px solid #f3dfac;color:#7a5600;padding:11px 14px;border-radius:var(--r-sm);margin-top:12px;font-size:13px}
.muted{color:var(--muted)}.right{text-align:right}.center{text-align:center}
.flex{display:flex;gap:10px;align-items:center}.flex.between{justify-content:space-between}.flex.wrap{flex-wrap:wrap}
.chart-box{position:relative;height:280px}.tag{font-size:11px;background:#eef1f5;border-radius:6px;padding:2px 7px;color:var(--muted)}
@media(max-width:820px){.sidebar{width:64px}.sidebar .logo small,.sidebar .who,.nav button span{display:none}.nav button{justify-content:center}.row,.row-3{grid-template-columns:1fr}}
.tag.success{background:#e7f6ee;color:var(--ok)}
.form2{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}
.form2 .side{position:sticky;top:78px}
.sub{font-size:13px;font-weight:700;margin:0 0 10px;color:var(--brand);border-bottom:1px solid var(--line);padding-bottom:6px}
.qadd{background:none;border:1px dashed var(--brand-2);color:var(--brand-2);border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer;font-weight:600;margin-left:6px}
.qadd:hover{background:#eef5fb}
.statussel{padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:#fff;max-width:160px}
.actions{display:flex;gap:4px;flex-wrap:wrap}.actions .btn{padding:4px 9px;font-size:11px}
table.data.tight th,table.data.tight td{padding:7px 9px;font-size:12.5px}
@media(max-width:1100px){.form2{grid-template-columns:1fr}.form2 .side{position:static}}
/* ---------- TELEFON ---------- */
@media(max-width:640px){
  .content{padding:12px}
  .topbar{padding:11px 14px}.topbar h1{font-size:16px}
  .panel{padding:13px;margin-bottom:13px;border-radius:8px}
  .filters{grid-template-columns:1fr 1fr;gap:8px}
  .kpis{grid-template-columns:1fr 1fr}.kpi .value{font-size:18px}
  .analysis{grid-template-columns:1fr 1fr}
  .grid[style*="1fr 1fr"]{grid-template-columns:1fr!important}
  .chart-box{height:230px}
  table.data th,table.data td,table.data.tight th,table.data.tight td{padding:8px 8px;font-size:12px}
  .btn{padding:9px 13px}.btn.sm{padding:7px 11px}
  .actions .btn{padding:7px 10px;font-size:12px}
  .statussel{max-width:130px;padding:7px}
  .modal-bg{padding:10px 8px}.modal{max-width:100%;border-radius:10px}.modal .body{padding:14px}
  .modal footer{padding:12px 14px}
  .field input,.field select,.field textarea{padding:10px 11px;font-size:15px}
  .sidebar .logo{padding:14px}
  #toasts{right:10px;left:10px;bottom:10px}.toast{max-width:100%}
  .qadd{padding:7px 10px}
}
@media(max-width:380px){ .filters{grid-template-columns:1fr}.kpis,.analysis{grid-template-columns:1fr} }
@media(max-width:600px){
  .content{padding:12px}
  .topbar{padding:10px 12px}.topbar h1{font-size:16px}
  .panel{padding:13px;border-radius:9px}
  .filters{grid-template-columns:1fr 1fr}
  .row,.row-3{grid-template-columns:1fr;gap:10px}
  .kpis{grid-template-columns:1fr 1fr}
  .analysis{grid-template-columns:1fr 1fr}
  .modal-bg{padding:12px 8px}.modal{border-radius:10px}.modal .body{padding:14px}
  .grid[style*="1fr 1fr"]{grid-template-columns:1fr!important}
  .chart-box{height:240px}
  table.data.tight th,table.data.tight td{padding:6px 7px;font-size:12px}
  .btn{padding:8px 12px}.actions .btn{padding:5px 8px}
  .sidebar{position:sticky;top:0;z-index:20}
}
@media(max-width:380px){ .filters{grid-template-columns:1fr}.kpis,.analysis{grid-template-columns:1fr} }

/* ---------- A4 ŠTAMPA (brza štampa ekrana) ---------- */
@media print{
  @page{size:A4;margin:14mm 12mm}
  .sidebar,.topbar,.nav,.btn,.filters,.stepper,#toasts,.no-print{display:none!important}
  .app,.main,.content{display:block;padding:0;margin:0;max-width:100%}
  body{background:#fff;font-size:11pt;color:#000}
  .panel{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;margin-bottom:8mm}
  table.data th{position:static;background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table.data td,table.data th{white-space:normal}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">Balkan Avto<small>Isplativost tura</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="who" id="who"></div>
  </aside>
  <div class="main">
    <div class="topbar"><h1 id="viewTitle">Dashboard</h1><div class="flex" id="topActions"></div></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toasts"></div>
<div id="modalRoot"></div>
<div id="loginOverlay" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2233,#1769aa)">
  <div style="background:#fff;border-radius:14px;padding:30px 28px;width:340px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.35)">
    <div style="font-size:20px;font-weight:800;color:#0f2233">Balkan Avto</div>
    <div style="color:#667;font-size:13px;margin-bottom:18px">Isplativost tura — prijava</div>
    <label style="font-size:13px;color:#445">Korisničko ime</label>
    <input id="loginUser" style="width:100%;padding:10px;margin:4px 0 12px;border:1px solid #cdd5dd;border-radius:8px" autocomplete="username">
    <label style="font-size:13px;color:#445">Lozinka</label>
    <input id="loginPass" type="password" style="width:100%;padding:10px;margin:4px 0 6px;border:1px solid #cdd5dd;border-radius:8px" autocomplete="current-password">
    <div id="loginErr" style="color:#c0392b;font-size:13px;min-height:18px;margin-bottom:6px"></div>
    <button onclick="doLogin()" style="width:100%;padding:11px;border:0;border-radius:8px;background:#1769aa;color:#fff;font-weight:700;font-size:15px;cursor:pointer">Prijava</button>
    <div style="color:#8794a0;font-size:12px;margin-top:12px;text-align:center">Demo: admin / admin · korisnik / korisnik</div>
  </div>
</div>
<script>
/* =====================================================================
   BALKAN AVTO — standalone (localStorage). Logika obračuna identična
   validiranoj Apps Script verziji. Otvara se dvoklikom na fajl.
   ===================================================================== */
/* ---------- enumi ---------- */
var TOUR_STATUS=['priprema','ponuda_poslata','prihvaćena','u_realizaciji','realizovana','fakturisana','naplaćena','otkazana','arhivirana'];
var ROLES=['admin','manager','operator','readonly'];
var COST_CATEGORIES=['gorivo','putarine','vozač','amortizacija','održavanje','gume','osiguranje','registracija','lizing','administracija','carina','parking','trajekt','špedicija','ostalo'];
var COST_TYPES=['fixed_per_tour','per_total_km','per_loaded_km','per_empty_km','per_day','percent_of_revenue','manual_amount','fuel_formula'];
var COST_TYPE_LABEL={fixed_per_tour:'fiksno po turi',per_total_km:'po ukupnom km',per_loaded_km:'po punom km',per_empty_km:'po praznom km',per_day:'po danu',percent_of_revenue:'% od prihoda',manual_amount:'ručni iznos',fuel_formula:'formula goriva'};
var CALC_BASES=['total_km','loaded_km','empty_km','days','revenue','manual','fuel_consumption'];
var STATUS_TONE={priprema:'neutral',ponuda_poslata:'ok','prihvaćena':'ok',u_realizaciji:'warn',realizovana:'success',fakturisana:'ok','naplaćena':'success',otkazana:'danger',arhivirana:'neutral'};

/* ---------- format helperi ---------- */
function num(v){ if(v===''||v===null||v===undefined) return 0; if(typeof v==='number') return isFinite(v)?v:0;
  var s=String(v).trim(); if(s.indexOf(',')>-1&&s.indexOf('.')>-1) s=s.replace(/\./g,'').replace(',','.'); else s=s.replace(',','.');
  s=s.replace(/[^0-9.\-]/g,''); var n=parseFloat(s); return isFinite(n)?n:0; }
function r2(v){ v=Number(v); return isFinite(v)?Math.round((v+Number.EPSILON)*100)/100:0; }
function safeDivide(a,b){ b=Number(b); return (!b||!isFinite(b))?0:a/b; }
function fmtN(v,d){ v=Number(v)||0; var f=v.toFixed(d); var p=f.split('.'); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.'); return d>0?p.join(','):p[0]; }
function eur(v){ return fmtN(r2(v),2)+' €'; }
function eurKm(v){ return fmtN(r2(v),2)+' €/km'; }
function pct(v){ return fmtN(r2(v),2)+'%'; }
function dateSr(v){ if(!v) return ''; var d=new Date(v); if(isNaN(d.getTime())) return String(v);
  return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+d.getFullYear()+'.'; }
function escapeHtml(v){ return String(v===undefined||v===null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function nowIso(){ return new Date().toISOString(); }
function uid(p){ return p+'-'+Date.now().toString(36)+Math.floor(Math.random()*1000); }

/* ---------- cloud + prijava + valuta ---------- */
var CONFIG={apiUrl:''};
var API_KEY='balkan_avto_api_url_v1';
var SESS_KEY='balkan_avto_user_v1';
var ONLINE=false, CURRENT_USER=null, _syncTimer=null;
function loadApiUrl(){ try{return localStorage.getItem(API_KEY)||'';}catch(e){return '';} }
function saveApiUrl(u){ try{ if(u)localStorage.setItem(API_KEY,u); else localStorage.removeItem(API_KEY);}catch(e){} }
function isAdmin(){ return CURRENT_USER&&CURRENT_USER.role==='admin'; }
function clientCurrency(c){ if(!c) return 'EUR'; var z=String(c.country||'').toLowerCase();
  if(c.currency==='DIN'||c.currency==='EUR') return c.currency;
  return (z.indexOf('srb')>-1||z.indexOf('srbij')>-1)?'DIN':'EUR'; }
function eurRate(){ var r=num(DB.settings.eur_din_rate); return r>0?r:117.5; }
function moneyDoc(eurV,cur){ eurV=r2(eurV); return cur==='DIN'?(fmtN(r2(eurV*eurRate()),2)+' RSD'):(fmtN(eurV,2)+' €'); }
function companyOpts(){ return (DB.companies||[]).filter(function(c){return c.active!==false;}).map(function(c){return {value:c.company_id,label:c.name};}); }
function defaultCompanyId(){ return DB.settings.default_company_id || ((DB.companies&&DB.companies[0])?DB.companies[0].company_id:''); }
function companyById(id){ var c=(DB.companies||[]).filter(function(x){return x.company_id===id;})[0]; if(c)return c; return (DB.companies&&DB.companies[0])||{name:DB.settings.company_name||'',iban:DB.settings.company_iban||'',swift:DB.settings.company_swift||'',bank_account:DB.settings.company_bank_account||'',pib:DB.settings.company_pib||'',vat_number:DB.settings.company_vat_number||'',address:'',city:'',country:'',email:'',phone:'',footer_text:DB.settings.pdf_footer_text||''}; }
function companyName(id){ var c=(DB.companies||[]).filter(function(x){return x.company_id===id;})[0]; return c?c.name:''; }
function selE(id,opts,selected,ph,onchange){ var o=(ph!==undefined?'<option value="">'+escapeHtml(ph)+'</option>':'');
  o+=opts.map(function(x){var v=(typeof x==='object')?x.value:x,l=(typeof x==='object')?x.label:x;return '<option value="'+escapeHtml(v)+'"'+(String(v)===String(selected)?' selected':'')+'>'+escapeHtml(l)+'</option>';}).join('');
  return '<select id="'+id+'"'+(onchange?' onchange="'+onchange+'"':'')+'>'+o+'</select>'; }

/* ---------- baza: localStorage + opciono Google Sheets ---------- */
var DB_KEY='balkan_avto_db_v1';
var DB=null;
function apiCall(action,payload){ var body=Object.assign({action:action},payload||{});
  return fetch(CONFIG.apiUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)})
    .then(function(r){return r.json();}).then(function(j){ if(!j||!j.ok) throw new Error((j&&j.error)||'Greška servera'); return j.data; }); }
function setOnline(on){ ONLINE=on; var b=document.getElementById('cloudBadge');
  if(b){ b.className='tag '+(on?'success':'neutral'); b.textContent=on?'● Google Sheets':'● Lokalno'; } }
function loadLocal(){ try{ return JSON.parse(localStorage.getItem(DB_KEY)); }catch(e){ return null; } }
function saveLocal(){ try{ localStorage.setItem(DB_KEY,JSON.stringify(DB)); }catch(e){} }
function loadDB(cb){
  CONFIG.apiUrl=CONFIG.apiUrl||loadApiUrl();
  if(CONFIG.apiUrl){
    apiCall('get').then(function(data){
      DB=(data&&data.settings)?data:(loadLocal()||seed());
      saveLocal(); setOnline(true); if(cb)cb();
    }).catch(function(){ DB=loadLocal()||seed(); setOnline(false); if(cb)cb(); });
    return;
  }
  DB=loadLocal(); if(!DB){ DB=seed(); saveLocal(); } setOnline(false); if(cb)cb();
}
function saveDB(){ saveLocal(); if(CONFIG.apiUrl&&ONLINE){ clearTimeout(_syncTimer);
  _syncTimer=setTimeout(function(){ apiCall('put',{db:DB}).catch(function(){ setOnline(false);
    if(typeof toast==='function') toast('Sinhronizacija pala — radim lokalno.','warn'); }); },400); } }
function pushCloudNow(){ return apiCall('put',{db:DB}); }
function table(t){ return DB[t]||(DB[t]=[]); }
function byId(t,field,id){ return table(t).filter(function(r){return r[field]===id;})[0]||null; }
function genTourNumber(){ var y=new Date().getFullYear(); var n=table('tours').filter(function(t){return (t.tour_number||'').indexOf('TOUR-'+y)===0;}).length+1; return 'TOUR-'+y+'-'+('000'+n).slice(-4); }

/* ---------- seed demo podataka ---------- */
function seed(){
  var db={settings:{},companies:[],clients:[],trucks:[],drivers:[],costItems:[],tours:[],tourCosts:[],documents:[],relations:[],users:[]};
  db.companies=[
    {company_id:'CO-AVTO',name:'BALKAN AVTO d.o.o.',short:'AVTO',address:'Industrijska 12',city:'Ljubljana',country:'Slovenija',
     pib:'SI12345678',registration_number:'SI-2100',vat_number:'SI12345678',email:'office@balkanavto.si',phone:'+386 1 234 5678',
     bank_account:'',iban:'SI56 0000 0000 0000 000',swift:'LJBASI2X',footer_text:'BALKAN AVTO d.o.o. — Hvala na poverenju.',logo_url:'',active:true},
    {company_id:'CO-TRANS',name:'BALKAN TRANSPORT d.o.o.',short:'TRANSPORT',address:'Bulevar 1',city:'Beograd',country:'Srbija',
     pib:'PIB123456789',registration_number:'21001122',vat_number:'RS123456789',email:'office@balkantransport.rs',phone:'+381 11 234 5678',
     bank_account:'160-000000123456-78',iban:'RS35160000000123456789',swift:'DBDBRSBG',footer_text:'BALKAN TRANSPORT d.o.o. — Hvala na poverenju.',logo_url:'',active:true}
  ];
  db.settings={ default_company_id:'CO-AVTO',
    fuel_price_eur_per_l:1.45, default_vat_rate:20, default_profit_margin_percent:15, default_payment_terms_days:30,
    eur_din_rate:117.5, pdf_footer_text:'Hvala na poverenju.',
    /* legacy (fallback) */ company_name:'BALKAN AVTO d.o.o.', company_iban:'', company_swift:'', company_bank_account:'', company_pib:'', company_vat_number:'', company_logo_url:'' };
  db.users.push(
    {user_id:uid('USR'),username:'admin',password:'admin',email:'',name:'Administrator',role:'admin',active:true,created_at:nowIso()},

function computeCostLine(item,ctx){
  var rate=num(item.rate_eur!==undefined?item.rate_eur:item.default_rate); var qty=0,amount=0;
  switch(item.type){
    case 'fixed_per_tour': qty=1; amount=rate; break;
    case 'per_total_km': qty=ctx.total_km; amount=ctx.total_km*rate; break;
    case 'per_loaded_km': qty=ctx.loaded_km; amount=ctx.loaded_km*rate; break;
    case 'per_empty_km': qty=ctx.empty_km; amount=ctx.empty_km*rate; break;
    case 'per_day': qty=ctx.days; amount=ctx.days*rate; break;
    case 'percent_of_revenue': qty=ctx.total_revenue; amount=ctx.total_revenue*rate/100; break;
    case 'manual_amount': qty=1; amount=num(item.manual_amount!==undefined?item.manual_amount:rate); break;
    case 'fuel_formula':
      var fl=ctx.loaded_km*ctx.consumption_loaded/100, fe=ctx.empty_km*ctx.consumption_empty/100;
      qty=fl+fe; amount=qty*ctx.fuel_price; break;
    default: qty=0; amount=num(item.manual_amount)||0;
  }
  return {quantity:r2(qty),rate:r2(rate),amount:r2(amount)};
}
function buildCostLinesFromActive(tour,truck,driver){
  return table('costItems').filter(function(c){return c.is_active===true||num(c.is_active)===1;}).map(function(c){
    var rate=num(c.default_rate);
    if(truck){ if(c.category==='amortizacija')rate=num(truck.depreciation_per_km_eur)||rate;
      if(c.category==='održavanje')rate=num(truck.maintenance_per_km_eur)||rate;
      if(c.category==='gume')rate=num(truck.tires_per_km_eur)||rate;
      if(c.category==='osiguranje')rate=num(truck.insurance_per_day_eur)||rate;
      if(c.category==='registracija')rate=num(truck.registration_per_day_eur)||rate;
      if(c.category==='lizing')rate=num(truck.leasing_per_day_eur)||rate; }
    if(driver&&c.category==='vozač'){ if(/dnevnic/i.test(c.name))rate=num(driver.default_daily_allowance_eur)||rate;
      if(/plata/i.test(c.name))rate=num(driver.default_salary_per_day_eur)||rate; }
    return {cost_item_id:c.cost_item_id,name:c.name,category:c.category,type:c.type,unit:c.unit,
      default_rate:rate,rate_eur:rate,calculation_base:c.calculation_base,manually_overridden:false};
  });
}
function calculateTourProfitability(tour,costItems,truck,driver){
  var s=DB.settings;
  var loaded_km=num(tour.loaded_km), empty_km=num(tour.empty_km), total_km=loaded_km+empty_km;
  var days=num(tour.days)||1;
  var empty_km_percent=safeDivide(empty_km,total_km)*100;
  var freight=num(tour.freight_revenue_eur), fuelSur=num(tour.fuel_surcharge_eur), other=num(tour.other_revenue_eur);
  var total_revenue=freight+fuelSur+other;
  var ctx={loaded_km:loaded_km,empty_km:empty_km,total_km:total_km,days:days,total_revenue:total_revenue,
    consumption_loaded:truck?num(truck.avg_consumption_loaded_l_100km):30,
    consumption_empty:truck?num(truck.avg_consumption_empty_l_100km):25,
    fuel_price:num(s.fuel_price_eur_per_l)||1.45};
  var lines=[], total_cost=0;
  (costItems||[]).forEach(function(item){
    if(item.manually_overridden&&item.amount_eur!==undefined){
      var amt=r2(num(item.amount_eur));
      lines.push({cost_item_id:item.cost_item_id,name:item.name,category:item.category,type:item.type,unit:item.unit,
        quantity:r2(num(item.quantity)),rate_eur:r2(num(item.rate_eur)),amount_eur:amt,
        calculation_base:item.calculation_base,auto_calculated:false,manually_overridden:true,note:item.note||''});
      total_cost+=amt; return;
    }
    var calc=computeCostLine(item,ctx);
    lines.push({cost_item_id:item.cost_item_id,name:item.name,category:item.category,type:item.type,unit:item.unit,
      quantity:calc.quantity,rate_eur:calc.rate,amount_eur:calc.amount,calculation_base:item.calculation_base,
      auto_calculated:true,manually_overridden:false,note:item.note||''});
    total_cost+=calc.amount;
  });
  total_cost=r2(total_cost);
  var gross_profit=r2(total_revenue-total_cost);
  var profit_margin=total_revenue>0?r2(safeDivide(gross_profit,total_revenue)*100):0;
  var target=num(tour.target_profit_margin_percent)||num(s.default_profit_margin_percent)||0;
  var suggested=(target>0&&target<100)?r2(safeDivide(total_cost,(1-target/100))):total_cost;
  var vat_rate=(tour.vat_rate_percent===undefined||tour.vat_rate_percent==='')?num(s.default_vat_rate):num(tour.vat_rate_percent);
  var vat_amount=r2(total_revenue*vat_rate/100), total_with_vat=r2(total_revenue+vat_amount);
  return {loaded_km:loaded_km,empty_km:empty_km,total_km:total_km,empty_km_percent:r2(empty_km_percent),days:days,
    total_revenue_eur:r2(total_revenue),total_cost_eur:total_cost,gross_profit_eur:gross_profit,profit_margin_percent:profit_margin,
    revenue_per_total_km_eur:r2(safeDivide(total_revenue,total_km)),cost_per_total_km_eur:r2(safeDivide(total_cost,total_km)),
    profit_per_total_km_eur:r2(safeDivide(gross_profit,total_km)),
    revenue_per_loaded_km_eur:r2(safeDivide(total_revenue,loaded_km)),cost_per_loaded_km_eur:r2(safeDivide(total_cost,loaded_km)),
    profit_per_loaded_km_eur:r2(safeDivide(gross_profit,loaded_km)),
    target_profit_margin_percent:r2(target),suggested_price_eur:suggested,minimum_price_eur:r2(total_cost),
    price_below_cost_warning:suggested<total_cost,vat_rate_percent:r2(vat_rate),vat_amount_eur:vat_amount,
    total_with_vat_eur:total_with_vat,profitability_status:profitabilityStatus(profit_margin,target),cost_lines:lines};
}
function profitabilityStatus(margin,target){ target=target||0;
  if(margin<0) return {key:'neisplativa',label:'Neisplativa',tone:'danger'};
  if(margin>=target+5) return {key:'odlicna',label:'Odlična',tone:'success'};
  if(margin>=target) return {key:'isplativa',label:'Isplativa',tone:'ok'};
  return {key:'pregovor',label:'Za pregovor',tone:'warn'}; }

function getFilteredTours(f){ f=f||{};
  var rows=table('tours').slice();
  var from=f.dateFrom?new Date(f.dateFrom):null, to=f.dateTo?new Date(f.dateTo):null;
  var out=rows.filter(function(t){
    if(f.company_id&&String(t.company_id)!==String(f.company_id)) return false;
    if(f.status&&t.status!==f.status) return false;
    if(f.client_id&&t.client_id!==f.client_id) return false;
    if(f.truck_id&&t.truck_id!==f.truck_id) return false;
    if(f.driver_id&&t.driver_id!==f.driver_id) return false;
    if(f.route){ var r=((t.origin||'')+' '+(t.destination||'')).toLowerCase(); if(r.indexOf(String(f.route).toLowerCase())===-1) return false; }
    if(f.minMargin!==undefined&&f.minMargin!==''&&num(t.profit_margin_percent)<num(f.minMargin)) return false;
    if(f.onlyRealized&&t.status!=='realizovana') return false;
    if(f.onlyCancelled&&t.status!=='otkazana') return false;
    if(f.onlyInvoiced&&['fakturisana','naplaćena'].indexOf(t.status)===-1) return false;
    if(f.onlyUninvoiced&&['fakturisana','naplaćena'].indexOf(t.status)!==-1) return false;
    if(from||to){ var d=t.start_date?new Date(t.start_date):(t.loading_date?new Date(t.loading_date):null);
      if(d&&!isNaN(d.getTime())){ if(from&&d<from) return false; if(to&&d>to) return false; } }
    return true;
  });
  out.sort(function(a,b){ return new Date(b.created_at||0)-new Date(a.created_at||0); });
  return {total:out.length,rows:out};
}
function getDashboard(f){

  tours.forEach(function(t){ if(t.status==='realizovana')k.realized++; if(t.status==='otkazana')k.cancelled++;
    k.revenue+=num(t.total_revenue_eur); k.cost+=num(t.total_cost_eur); k.profit+=num(t.gross_profit_eur);

  if(rows.length){ var T={rev:0,cost:0,profit:0,km:0,n:0}; Object.keys(map).forEach(function(id){var m=map[id];T.rev+=m.rev;T.cost+=m.cost;T.profit+=m.profit;T.km+=m.km;T.n+=m.n;});
    rows.push({firma:'ZBIRNO',ture:T.n,prihod:r2(T.rev),trosak:r2(T.cost),profit:r2(T.profit),marza:r2(safeDivide(T.profit,T.rev)*100),prihod_km:r2(safeDivide(T.rev,T.km)),trosak_km:r2(safeDivide(T.cost,T.km))}); }
  return rows; }
function rankTours(tours,best,n){ var s=tours.slice().sort(function(a,b){return num(b.gross_profit_eur)-num(a.gross_profit_eur);}); if(!best)s.reverse();
  return s.slice(0,n).map(function(t){return {tour_number:t.tour_number,client:t.client_name_snapshot,route:t.origin+' → '+t.destination,
    revenue:r2(num(t.total_revenue_eur)),cost:r2(num(t.total_cost_eur)),profit:r2(num(t.gross_profit_eur)),margin:r2(num(t.profit_margin_percent)),profitPerKm:r2(num(t.profit_per_total_km_eur))};}); }
function monthsAgg(tours){ var bm={};
  tours.forEach(function(t){ var d=t.start_date?new Date(t.start_date):(t.created_at?new Date(t.created_at):null);
    var key=(d&&!isNaN(d.getTime()))?d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2):'n/a';
    bm[key]=bm[key]||{revenue:0,cost:0,profit:0,count:0}; bm[key].revenue+=num(t.total_revenue_eur); bm[key].cost+=num(t.total_cost_eur);
    bm[key].profit+=num(t.gross_profit_eur); bm[key].count++; });
  return Object.keys(bm).sort().map(function(m){return {month:m,count:bm[m].count,revenue:r2(bm[m].revenue),cost:r2(bm[m].cost),profit:r2(bm[m].profit),margin:r2(safeDivide(bm[m].profit,bm[m].revenue)*100)};}); }
function costByCategory(tours){ var ids={}; tours.forEach(function(t){ids[t.tour_id]=true;});
  var rows=table('tourCosts').filter(function(c){return ids[c.tour_id];}); var map={};
  rows.forEach(function(c){ var cat=c.category_snapshot||'ostalo'; map[cat]=(map[cat]||0)+num(c.amount_eur); });
  var total=0; Object.keys(map).forEach(function(k){total+=map[k];});
  return Object.keys(map).map(function(k){return {category:k,amount:r2(map[k]),percent:r2(safeDivide(map[k],total)*100)};}).sort(function(a,b){return b.amount-a.amount;}); }
function fixedVsVariable(tours){ var ids={}; tours.forEach(function(t){ids[t.tour_id]=true;});
  var rows=table('tourCosts').filter(function(c){return ids[c.tour_id];}); var fixedTypes=['fixed_per_tour','per_day']; var fx=0,vr=0;
  rows.forEach(function(c){ if(fixedTypes.indexOf(c.type_snapshot)!==-1)fx+=num(c.amount_eur); else vr+=num(c.amount_eur); });
  return {fixed:r2(fx),variable:r2(vr),fixedPercent:r2(safeDivide(fx,fx+vr)*100),variablePercent:r2(safeDivide(vr,fx+vr)*100)}; }
function buildCharts(tours){ var ids={}; tours.forEach(function(t){ids[t.tour_id]=true;});
  var byStatus={}; tours.forEach(function(t){byStatus[t.status]=(byStatus[t.status]||0)+1;});
  return {monthly:monthsAgg(tours),byClient:aggregateBy(tours,'client_name_snapshot'),byTruck:aggregateBy(tours,'truck_plate_snapshot'),
    byStatus:Object.keys(byStatus).map(function(s){return {label:s,value:byStatus[s]};}),costStructure:costByCategory(tours).map(function(c){return {label:c.category,value:c.amount};}),
    topTours:rankTours(tours,true,10)}; }
function mapTourRow(t){ return {broj:t.tour_number,klijent:t.client_name_snapshot,relacija:t.origin+' → '+t.destination,status:t.status,
  prihod:r2(num(t.total_revenue_eur)),trosak:r2(num(t.total_cost_eur)),profit:r2(num(t.gross_profit_eur)),marza:r2(num(t.profit_margin_percent))}; }
function getReport(type,f){ var tours=getFilteredTours(f).rows;
  switch(type){
    case 'by_tour': return tours.map(function(t){return {broj:t.tour_number,klijent:t.client_name_snapshot,relacija:t.origin+' → '+t.destination,status:t.status,
      prihod:r2(num(t.total_revenue_eur)),trosak:r2(num(t.total_cost_eur)),profit:r2(num(t.gross_profit_eur)),marza:r2(num(t.profit_margin_percent)),
      prihod_km:r2(num(t.revenue_per_total_km_eur)),trosak_km:r2(num(t.cost_per_total_km_eur)),profit_km:r2(num(t.profit_per_total_km_eur)),
      total_km:num(t.total_km),prazni_km:num(t.empty_km)};});
    case 'by_client': return aggregateBy(tours,'client_name_snapshot');
    case 'by_company': return byCompanyReport(tours);
    case 'by_truck': return aggregateBy(tours,'truck_plate_snapshot');
    case 'by_driver': return aggregateBy(tours,'driver_name_snapshot');
    case 'by_route': return aggregateBy(tours.map(function(t){var c=Object.assign({},t);c.__r=(t.origin||'?')+' → '+(t.destination||'?');return c;}),'__r');
    case 'by_month': return monthsAgg(tours);
    case 'cost_by_category': return costByCategory(tours);
    case 'fixed_vs_variable': return fixedVsVariable(tours);
    case 'empty_km': return tours.map(function(t){return {broj:t.tour_number,kamion:t.truck_plate_snapshot,puni_km:num(t.loaded_km),prazni_km:num(t.empty_km),total_km:num(t.total_km),prazan_procenat:r2(num(t.empty_km_percent))};});
    case 'per_km': return tours.map(function(t){return {broj:t.tour_number,relacija:t.origin+' → '+t.destination,prihod_km:r2(num(t.revenue_per_total_km_eur)),trosak_km:r2(num(t.cost_per_total_km_eur)),profit_km:r2(num(t.profit_per_total_km_eur))};});
    case 'top10': return rankTours(tours,true,10);
    case 'bottom10': return rankTours(tours,false,10);
    case 'cancelled': return tours.filter(function(t){return t.status==='otkazana';}).map(mapTourRow);
    case 'invoicing': return {invoiced:tours.filter(function(t){return ['fakturisana','naplaćena'].indexOf(t.status)!==-1;}).map(mapTourRow),uninvoiced:tours.filter(function(t){return t.status==='realizovana';}).map(mapTourRow)};
    case 'collection': return {collected:tours.filter(function(t){return t.status==='naplaćena';}).map(mapTourRow),uncollected:tours.filter(function(t){return t.status==='fakturisana';}).map(mapTourRow)};
    case 'conversion': var offered=tours.filter(function(t){return ['ponuda_poslata','prihvaćena','u_realizaciji','realizovana','fakturisana','naplaćena'].indexOf(t.status)!==-1;}).length;
      var realized=tours.filter(function(t){return ['realizovana','fakturisana','naplaćena'].indexOf(t.status)!==-1;}).length;
      return {offered:offered,realized:realized,conversionPercent:r2(safeDivide(realized,offered)*100)};
    default: return [];
  }
}

function printDoc(fileName,inner){
  var s=DB.settings;
  var css='@page{size:A4;margin:18mm 16mm}*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;font-size:11pt;line-height:1.45;margin:0}'+

    '.muted{color:#666;font-size:9.5pt}.right{text-align:right}.head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6mm}'+
    '.box{border:1px solid #ddd;padding:3mm;border-radius:2mm}table{width:100%;border-collapse:collapse;margin-top:2mm}'+
    'th,td{border:1px solid #ddd;padding:2mm 2.5mm;text-align:left;font-size:10pt}th{background:#f3f4f6}td.num,th.num{text-align:right}'+
    '.totals td{border:none;padding:1mm 2.5mm}.totals .grand{font-weight:bold;font-size:12pt;border-top:2px solid #333}'+
    '.sign{margin-top:14mm;display:flex;justify-content:space-between}.sign div{width:45%;border-top:1px solid #333;padding-top:1mm;text-align:center;font-size:9.5pt}'+
    '.footer{margin-top:10mm;color:#666;font-size:9pt;text-align:center;border-top:1px solid #eee;padding-top:2mm}';
  var html='<!DOCTYPE html><html lang="sr"><head><meta charset="utf-8"><title>'+escapeHtml(fileName)+'</title><style>'+css+'</style></head><body>'+inner+'</body></html>';
  var ifr=document.createElement('iframe'); ifr.style.position='fixed'; ifr.style.right='0'; ifr.style.bottom='0'; ifr.style.width='0'; ifr.style.height='0'; ifr.style.border='0';
  document.body.appendChild(ifr);
  var doc=ifr.contentWindow.document; doc.open(); doc.write(html); doc.close();

}

  else tableHtml='<p class="muted">Agregatni izveštaj — vidi ekran. KPI pregled je ispod.</p>';
  var period=(f.dateFrom||f.dateTo)?((f.dateFrom?dateSr(f.dateFrom):'...')+' – '+(f.dateTo?dateSr(f.dateTo):'...')):'svi periodi';
  var inner=companyHead()+'<div class="right"><h2 style="border:none">IZVEŠTAJ</h2>'+escapeHtml(title)+'<br>Period: '+period+(f.onlyRealized?' · samo realizovane':'')+'<br>Datum: '+dateSr(new Date())+'</div></div>'+
    '<h2>Ključni pokazatelji</h2><table><tr><th>Broj tura</th><td class="num">'+dash.count+'</td><th>Ukupan prihod</th><td class="num">'+eur(dash.revenue)+'</td></tr>'+
    '<tr><th>Ukupan trošak</th><td class="num">'+eur(dash.cost)+'</td><th>Bruto profit</th><td class="num">'+eur(dash.profit)+'</td></tr>'+
    '<tr><th>Prosečna marža</th><td class="num">'+pct(dash.avgMargin)+'</td><th>Prihod/km</th><td class="num">'+eurKm(dash.avgRevenuePerKm)+'</td></tr>'+
    '<tr><th>Trošak/km</th><td class="num">'+eurKm(dash.avgCostPerKm)+'</td><th>Profit/km</th><td class="num">'+eurKm(dash.avgProfitPerKm)+'</td></tr></table>'+
    '<h2>Detalji</h2>'+tableHtml+'<div class="footer">'+escapeHtml(DB.settings.pdf_footer_text)+' · Generisano '+dateSr(new Date())+'</div>';
  printDoc('Izvestaj_'+type,inner); toast('PDF izveštaj spreman — „Sačuvaj kao PDF".','ok'); }
/* ---------- ADMINISTRACIJA ---------- */
function viewAdmin(){ var tabs=[['company','Podešavanja'],['firme','Firme'],['clients','Klijenti'],['trucks','Kamioni'],['drivers','Vozači'],['costs','Troškovne stavke'],['users','Korisnici'],['sync','Sinhronizacija']];
  document.getElementById('content').innerHTML='<div class="panel"><div class="flex wrap" id="adminTabs">'+tabs.map(function(t,i){return '<button class="btn '+(i===0?'':'sec')+'" data-t="'+t[0]+'" onclick="adminTab(\''+t[0]+'\')">'+t[1]+'</button>';}).join('')+'</div></div><div id="adminBody"></div>'; adminTab('company'); }
function adminTab(t){ document.querySelectorAll('#adminTabs button').forEach(function(b){b.className='btn '+(b.dataset.t===t?'':'sec');});
  ({company:adminCompany,firme:adminCompanies,clients:function(){adminList('clients');},trucks:function(){adminList('trucks');},drivers:function(){adminList('drivers');},costs:adminCosts,users:adminUsers,sync:adminSync}[t])(); }
function adminSync(){ var cur=CONFIG.apiUrl||'';
  var st=ONLINE?'<span class="tag success">● Povezano — Google Sheets</span>':'<span class="tag neutral">● Radi lokalno (localStorage)</span>';
  document.getElementById('adminBody').innerHTML='<div class="panel" style="max-width:640px"><h2>Povezivanje sa Google Sheets bazom</h2>'+
    '<p style="margin:2px 0 12px">'+st+'</p>'+
    '<div class="field"><label>Web App URL (Apps Script, završava na /exec)</label><input id="sy_url" value="'+escapeHtml(cur)+'" placeholder="https://script.google.com/macros/s/.../exec"></div>'+
    '<div class="flex wrap" style="margin-top:10px"><button class="btn" onclick="syncConnect()">Sačuvaj i poveži</button>'+
    '<button class="btn sec" onclick="syncTest()">Testiraj vezu</button>'+
    (ONLINE?'<button class="btn sec" onclick="syncPush()">Pošalji lokalne podatke u oblak</button><button class="btn sec" onclick="syncDisconnect()">Prekini vezu</button>':'')+'</div>'+
    '<p class="muted" style="margin-top:12px">URL se pamti u ovom pregledaču. Cela baza se čuva u Google Sheet-u (list „DB"), uz zaključavanje za 2–3 korisnika. Bez URL-a aplikacija radi lokalno i otvara se na dvoklik.</p></div>'; }
function syncTest(){ var u=(val('sy_url')||'').trim()||CONFIG.apiUrl; if(!u){toast('Unesi URL.','err');return;} toast('Testiram...','ok');
  fetch(u,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'get'})})
    .then(function(r){return r.json();}).then(function(j){ toast(j&&j.ok?'Veza ispravna ✓':'Server javlja grešku: '+((j&&j.error)||'?'),(j&&j.ok)?'ok':'err'); })
    .catch(function(){ toast('Veza neuspela — proveri URL i da je Deploy „Anyone".','err'); }); }
function syncConnect(){ var u=(val('sy_url')||'').trim(); if(!u){toast('Unesi URL.','err');return;}
  if(!/^https:\/\/script\.google\.com\/.*\/exec$/.test(u)){ if(!confirm('URL ne izgleda kao Apps Script „/exec" adresa. Nastaviti?')) return; }
  CONFIG.apiUrl=u; saveApiUrl(u); toast('Povezujem...','ok');
  apiCall('get').then(function(data){
    if(data&&data.settings){ if(confirm('Oblak već ima podatke. Učitati ih (prepiši lokalne)? \nOK = učitaj iz oblaka · Cancel = pošalji lokalne u oblak')){ DB=data; saveLocal(); }
      else { return pushCloudNow(); } }
    else { return pushCloudNow(); }
  }).then(function(){ ensureAuthUsers(); setOnline(true); toast('Povezano sa Google Sheets ✓','ok'); adminTab('sync'); })
    .catch(function(e){ setOnline(false); toast('Greška: '+(e.message||'veza nije uspela'),'err'); adminTab('sync'); }); }
function syncPush(){ toast('Šaljem...','ok'); pushCloudNow().then(function(){toast('Poslato u oblak ✓','ok');}).catch(function(e){toast('Greška: '+(e.message||'?'),'err');}); }
function syncDisconnect(){ if(!confirm('Prekinuti vezu i raditi lokalno?')) return; CONFIG.apiUrl=''; saveApiUrl(''); setOnline(false); toast('Veza prekinuta — radim lokalno.','ok'); adminTab('sync'); }
function adminUsers(){ var rows=table('users').map(function(u){return '<tr><td>'+escapeHtml(u.username||'')+'</td><td>'+escapeHtml(u.name||'')+'</td><td>'+escapeHtml(u.role||'')+'</td>'+

  document.getElementById('adminBody').innerHTML='<div class="panel"><div class="flex between"><h2>Korisnici</h2><button class="btn" onclick="editUser()">+ Novi</button></div>'+

function saveUser(id){ if(!val('us_username')||!val('us_password')){toast('Korisničko ime i lozinka su obavezni.','err');return;}

function adminCompany(){ var s=DB.settings;
  var g=[['default_vat_rate','PDV stopa (%)'],['default_profit_margin_percent','Ciljna marža (%)'],['default_payment_terms_days','Rok plaćanja (dana)'],['eur_din_rate','Kurs EUR/RSD'],['fuel_price_eur_per_l','Cena goriva €/l'],['pdf_footer_text','Tekst u podnožju PDF-a']];

  ['default_vat_rate','default_profit_margin_percent','default_payment_terms_days','eur_din_rate','fuel_price_eur_per_l'].forEach(function(k){ s[k]=num(val('set_'+k)); });

function adminCompanies(){ var rows=(DB.companies||[]).map(function(c){return '<tr><td><b>'+escapeHtml(c.name)+'</b></td><td>'+escapeHtml(c.country||'')+'</td><td>'+escapeHtml(c.pib||'')+'</td><td>'+escapeHtml(c.vat_number||'')+'</td>'+

  document.getElementById('adminBody').innerHTML='<div class="panel"><div class="flex between"><h2>Firme (nosioci posla)</h2><button class="btn" onclick="editCompany()">+ Nova firma</button></div>'+
    '<div class="table-wrap"><table class="data"><thead><tr><th>Naziv</th><th>Država</th><th>PIB</th><th>PDV</th><th></th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<p class="muted" style="margin-top:8px">Svaka tura, ponuda i nalog imaju firmu nosioca — njeni podaci idu u zaglavlje PDF-a.</p></div>'; }
var CO_FIELDS=[['name','Naziv*'],['short','Kratko ime'],['address','Adresa'],['city','Grad'],['country','Država'],['pib','PIB'],['registration_number','Matični broj'],['vat_number','PDV broj'],['email','Email'],['phone','Telefon'],['bank_account','Račun'],['iban','IBAN'],['swift','SWIFT'],['footer_text','Tekst u podnožju']];
function editCompany(id){ var c=id?companyById(id):{active:true};
  var form=CO_FIELDS.map(function(d){return field(d[1],inp('co_'+d[0],c[d[0]]));}).join('');
  openModal((id?'Izmena':'Nova')+' firma','<div class="row">'+form+'</div>','<button class="btn" onclick="saveCompany2(\''+(id||'')+'\')">Sačuvaj</button>'); }
function saveCompany2(id){ if(!val('co_name')){toast('Naziv je obavezan.','err');return;}
  var c=id?companyById(id):{company_id:'CO-'+Date.now().toString(36).toUpperCase().slice(-5),active:true};

  if(!id) table('companies').push(c); saveDB(); toast('Firma sačuvana.','ok'); closeModal(); adminTab('firme'); }
function adminList(kind){ var data=table(kind); var cols={clients:['client_id','client_name','pib_vat','city','active'],trucks:['truck_id','plate_number','brand','model','active'],drivers:['driver_id','full_name','phone','active']}[kind];
  var idF=cols[0]; var rows=data.map(function(r){return '<tr>'+cols.map(function(cl){var v=r[cl]; if(cl==='active')v=act(r)?badge('aktivan','success'):badge('neaktivan','neutral'); return '<td>'+v+'</td>';}).join('')+'<td><button class="btn sm sec" onclick="editEntity(\''+kind+'\',\''+r[idF]+'\')">Izmeni</button></td></tr>';}).join('');
  var titles={clients:'Klijenti',trucks:'Kamioni',drivers:'Vozači'};
  document.getElementById('adminBody').innerHTML='<div class="panel"><div class="flex between"><h2>'+titles[kind]+'</h2><button class="btn" onclick="editEntity(\''+kind+'\')">+ Novi</button></div><div class="table-wrap"><table class="data"><thead><tr>'+cols.map(function(c){return '<th>'+c+'</th>';}).join('')+'<th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'; }
function editEntity(kind,id){ var idF={clients:'client_id',trucks:'truck_id',drivers:'driver_id'}[kind]; var rec=id?byId(kind,idF,id):{};
  var defs={clients:[['client_name','Naziv*'],['legal_name','Pravni naziv'],['pib_vat','PIB/VAT'],['registration_number','Matični'],['address','Adresa'],['city','Grad'],['country','Država'],['currency','Valuta (EUR/DIN; prazno=auto)'],['company_id','Podrazumevana firma'],['contact_person','Kontakt osoba'],['email','Email'],['phone','Telefon'],['billing_email','Email za fakture'],['payment_terms_days','Rok plaćanja'],['note','Napomena']],
    trucks:[['plate_number','Tablica*'],['trailer_plate_number','Tablica prikolice'],['company_id','Firma'],['brand','Marka'],['model','Model'],['year','Godina'],['euro_standard','Euro standard'],['truck_type','Tip'],['capacity_kg','Nosivost kg'],['fuel_type','Gorivo'],['avg_consumption_loaded_l_100km','Potrošnja pun l/100km'],['avg_consumption_empty_l_100km','Potrošnja prazan l/100km'],['depreciation_per_km_eur','Amortizacija €/km'],['maintenance_per_km_eur','Održavanje €/km'],['tires_per_km_eur','Gume €/km'],['insurance_per_day_eur','Osiguranje €/dan'],['registration_per_day_eur','Registracija €/dan'],['leasing_per_day_eur','Lizing €/dan'],['other_fixed_per_day_eur','Ostalo fiksno €/dan'],['note','Napomena']],
    drivers:[['full_name','Ime i prezime*'],['company_id','Firma'],['phone','Telefon'],['email','Email'],['license_number','Vozačka'],['passport_number','Pasoš'],['default_daily_allowance_eur','Dnevnica €'],['default_salary_per_day_eur','Plata €/dan'],['default_bonus_per_km_eur','Bonus €/km'],['note','Napomena']]}[kind];
  var form=defs.map(function(d){ if(d[0]==='company_id') return field(d[1],selectHtml('ef_company_id',companyOpts(),rec.company_id,'— firma —')); return field(d[1],inp('ef_'+d[0],rec[d[0]])); }).join('')+field('Aktivan',selectHtml('ef_active',[{value:'true',label:'Da'},{value:'false',label:'Ne'}],id?String(act(rec)):'true'));
  openModal((id?'Izmena':'Novi')+' — '+kind,'<div class="row">'+form+'</div>','<button class="btn" onclick="saveEntity(\''+kind+'\',\''+(id||'')+'\')">Sačuvaj</button>'); window.__edefs={defs:defs,kind:kind,idF:idF}; }
function saveEntity(kind,id){ var E=window.__edefs; var numFields=['payment_terms_days','year','capacity_kg','avg_consumption_loaded_l_100km','avg_consumption_empty_l_100km','depreciation_per_km_eur','maintenance_per_km_eur','tires_per_km_eur','insurance_per_day_eur','registration_per_day_eur','leasing_per_day_eur','other_fixed_per_day_eur','default_daily_allowance_eur','default_salary_per_day_eur','default_bonus_per_km_eur'];
  var obj=id?byId(kind,E.idF,id):{}; E.defs.forEach(function(d){var v=val('ef_'+d[0]); obj[d[0]]=numFields.indexOf(d[0])>-1?num(v):v;}); obj.active=(val('ef_active')==='true');
  if(!id){ var prefix={clients:'CLIENT',trucks:'TRUCK',drivers:'DRIVER'}[kind]; var n=table(kind).filter(function(r){return (r[E.idF]||'').indexOf(prefix+'-')===0;}).length+1; obj[E.idF]=prefix+'-'+('000'+n).slice(-4); table(kind).push(obj); }
  saveDB(); toast('Sačuvano.','ok'); closeModal(); adminTab(kind); }
function adminCosts(){ var data=table('costItems');
  var rows=data.map(function(c){return '<tr><td>'+escapeHtml(c.name)+'</td><td>'+escapeHtml(c.category)+'</td><td>'+escapeHtml(COST_TYPE_LABEL[c.type]||c.type)+'</td><td>'+escapeHtml(c.unit)+'</td><td class="num">'+fmtN(num(c.default_rate),2)+'</td>'+

function editCost(id){ var c=id?byId('costItems','cost_item_id',id):{is_active:true,is_mandatory:false};
  var body='<div class="row">'+field('Naziv*',inp('ci_name',c.name))+field('Kategorija',selectHtml('ci_category',COST_CATEGORIES,c.category))+'</div>'+
    '<div class="row">'+field('Tip obračuna',selectHtml('ci_type',COST_TYPES.map(function(t){return {value:t,label:COST_TYPE_LABEL[t]};}),c.type))+field('Osnova',selectHtml('ci_base',CALC_BASES,c.calculation_base))+'</div>'+
    '<div class="row">'+field('Jedinica',inp('ci_unit',c.unit))+field('Default stopa',inp('ci_rate',c.default_rate))+'</div>'+
    '<div class="row">'+field('Obavezna',selectHtml('ci_mand',[{value:'true',label:'Da'},{value:'false',label:'Ne'}],String(c.is_mandatory===true||num(c.is_mandatory)===1)))+field('Aktivna',selectHtml('ci_active',[{value:'true',label:'Da'},{value:'false',label:'Ne'}],String(!(c.is_active===false||num(c.is_active)===0))))+'</div>'+field('Napomena',inp('ci_note',c.note));
  openModal((id?'Izmena':'Nova')+' troškovna stavka',body,'<button class="btn" onclick="saveCost(\''+(id||'')+'\')">Sačuvaj</button>'); }
function saveCost(id){ if(!val('ci_name')){toast('Naziv je obavezan.','err');return;}
  var obj=id?byId('costItems','cost_item_id',id):{created_at:nowIso(),sort_order:table('costItems').length+1};
  obj.name=val('ci_name'); obj.category=val('ci_category'); obj.type=val('ci_type'); obj.calculation_base=val('ci_base'); obj.unit=val('ci_unit');
  obj.default_rate=num(val('ci_rate')); obj.is_mandatory=val('ci_mand')==='true'; obj.is_active=val('ci_active')==='true'; obj.note=val('ci_note'); obj.updated_at=nowIso();
  if(!id){ var n=table('costItems').length+1; obj.cost_item_id='COST-'+('000'+n).slice(-4); table('costItems').push(obj); }
  saveDB(); toast('Sačuvano. Stavka je odmah aktivna u obračunu.','ok'); closeModal(); adminTab('costs'); }
