<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balkan AVTO — Isplativost tura</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#eef1f4; --surface:#ffffff; --surface-2:#f7f9fb;
  --sidebar:#13202e; --sidebar-2:#1c2e40; --sidebar-tx:#aebccb;
  --primary:#1d6fb8; --primary-d:#155a96; --accent:#e8a33d;
  --profit:#1f9d57; --loss:#d6453f; --warn:#e8a33d;
  --tx:#1a2530; --muted:#6b7886; --line:#dde3e9;
  --radius:10px; --shadow:0 1px 3px rgba(20,40,60,.08),0 6px 18px rgba(20,40,60,.05);
  --mono:"SFMono-Regular",ui-monospace,"Cascadia Mono",Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--tx);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
.num{font-variant-numeric:tabular-nums;font-family:var(--mono)}
.hidden{display:none!important}

/* ---------- Login ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 30% 20%,#1c2e40,#0c1622)}
.login-card{background:var(--surface);padding:34px 32px;border-radius:14px;width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-card h1{margin:0 0 4px;font-size:20px;letter-spacing:.3px}
.login-card .sub{color:var(--muted);font-size:12px;margin-bottom:22px}
.login-card .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.login-card .mark{width:34px;height:34px;border-radius:8px;background:var(--primary);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);
  border-radius:8px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--tx)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--primary);outline-offset:-1px;border-color:var(--primary)}
.btn{background:var(--primary);color:#fff;border:none;padding:10px 16px;border-radius:8px;
  font-weight:600;font-size:14px}
.btn:hover{background:var(--primary-d)}
.btn.full{width:100%;margin-top:18px;padding:11px}
.btn.ghost{background:transparent;color:var(--primary);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger{background:var(--loss)}
.btn.danger:hover{filter:brightness(.92)}
.err{color:var(--loss);font-size:12px;margin-top:10px;min-height:16px}

/* ---------- Shell ---------- */
#app{display:none;min-height:100vh}
.layout{display:grid;grid-template-columns:226px 1fr;min-height:100vh}
.side{background:var(--sidebar);color:var(--sidebar-tx);padding:18px 12px;display:flex;flex-direction:column}
.side .logo{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;color:#fff}
.side .logo .mark{width:30px;height:30px;border-radius:7px;background:var(--primary);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.side .logo b{font-size:14px;letter-spacing:.3px}
.side .logo small{display:block;color:var(--sidebar-tx);font-weight:400;font-size:10px;letter-spacing:.5px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
  border:none;color:var(--sidebar-tx);padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:500}
.nav button:hover{background:var(--sidebar-2);color:#fff}
.nav button.active{background:var(--primary);color:#fff}
.nav .group{font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:#56708a;padding:16px 12px 6px;font-weight:700}
.nav .ico{width:18px;text-align:center;opacity:.9}
.side .who{margin-top:auto;padding:12px 10px 4px;border-top:1px solid #24384c;font-size:12px}
.side .who b{color:#fff}
.side .who .role{display:inline-block;background:var(--sidebar-2);color:#cdd9e5;border-radius:20px;
  padding:1px 9px;font-size:10px;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

.main{padding:22px 26px;overflow:auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.topbar h2{margin:0;font-size:20px}
.topbar .desc{color:var(--muted);font-size:12.5px;margin-top:2px}
.cloud{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.cloud.on{background:#e3f5ec;color:#1f9d57}
.cloud.off{background:#fdeceb;color:#d6453f}

/* ---------- Cards / tables ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.card h3{margin:0 0 14px;font-size:15px}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.kpi .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.kpi .val{font-size:23px;font-weight:700;margin-top:6px}
.kpi .val.green{color:var(--profit)} .kpi .val.red{color:var(--loss)}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:3px}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  font-weight:700;cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:var(--primary)}
tbody tr:hover{background:var(--surface-2)}
td.r,th.r{text-align:right}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill.plan{background:#eef4fb;color:#1d6fb8}
.pill.real{background:#e3f5ec;color:#1f9d57}
.pill.canc{background:#f1f3f5;color:#6b7886}
.pos{color:var(--profit);font-weight:600}.neg{color:var(--loss);font-weight:600}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
.toolbar .f{min-width:140px}
.toolbar .f.sm{min-width:110px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.hint{font-size:11px;color:var(--muted);margin-top:4px}
.tag{font-size:11px;color:var(--muted)}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(15,25,38,.55);display:flex;align-items:flex-start;
  justify-content:center;padding:40px 16px;overflow:auto;z-index:50}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:680px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.modal header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal header h3{margin:0;font-size:17px}
.modal .body{padding:20px 22px}
.modal .foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
.calc-box{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:6px}
.calc-line{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.calc-line.tot{border-top:1px solid var(--line);margin-top:6px;padding-top:8px;font-weight:700;font-size:15px}
canvas{max-width:100%}
.chart-wrap{position:relative;height:300px}
.two-charts{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#13202e;color:#fff;
  padding:11px 20px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:99;font-size:13px;opacity:0;
  transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
@media(max-width:860px){
  .layout{grid-template-columns:1fr}
  .side{flex-direction:row;flex-wrap:wrap;align-items:center;padding:10px}
  .side .who{margin:0 0 0 auto;border:none;padding:0}
  .nav{display:flex;flex-wrap:wrap;gap:4px}
  .nav .group{display:none}
  .two-charts{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="mark">BA</div>
      <div><b style="font-size:16px">Balkan AVTO</b><div class="sub" style="margin:0">Isplativost tura</div></div>
    </div>
    <label>Korisničko ime</label>
    <input id="loginUser" autocomplete="username" placeholder="admin">
    <label>Lozinka</label>
    <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••">
    <button class="btn full" onclick="doLogin()">Prijava</button>
    <div class="err" id="loginErr"></div>
    <div class="hint" style="margin-top:14px">Demo: <b>admin/admin</b> ili <b>korisnik/korisnik</b></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <div class="layout">
    <aside class="side">
      <div class="logo">
        <div class="mark">BA</div>
        <div><b>Balkan AVTO</b><small>ISPLATIVOST TURA</small></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="who" id="who"></div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="viewTitle">Pregled</h2>
          <div class="desc" id="viewDesc"></div>
        </div>
        <span class="cloud off" id="cloudBadge">● Lokalno</span>
      </div>
      <div id="view"></div>
    </main>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ============================================================
   KONFIGURACIJA
   Nalepi Web App URL iz Apps Script-a između navodnika.
   Ako ostane prazno, aplikacija radi lokalno (localStorage).
   ============================================================ */
var CONFIG = { apiUrl: "" };

/* ---------- Helperi za format ---------- */
var nf2 = new Intl.NumberFormat('sr-RS',{minimumFractionDigits:2,maximumFractionDigits:2});
var nf0 = new Intl.NumberFormat('sr-RS',{maximumFractionDigits:0});
function n(v){ v=parseFloat(String(v).replace(',','.')); return isNaN(v)?0:v; }
function eur(v){ return nf2.format(n(v))+' \u20ac'; }
function money(v,cur){ return nf2.format(n(v))+' '+(cur==='DIN'?'DIN':'\u20ac'); }
function km(v){ return nf0.format(n(v))+' km'; }
function perKm(v){ return nf2.format(n(v))+' \u20ac/km'; }
function pct(v){ return nf2.format(n(v))+' %'; }
function dt(iso){ if(!iso) return ''; var p=String(iso).split('-'); return p.length===3?p[2]+'.'+p[1]+'.'+p[0]+'.':iso; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(p){ return p+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function daysBetween(a,b){ if(!a||!b) return 0; var d=(new Date(b)-new Date(a))/86400000; return d<0?0:Math.round(d)+1; }

function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2200); }

/* ============================================================
   STANJE + SLOJ ZA PODATKE (cloud Apps Script ili localStorage)
   ============================================================ */
var LS_KEY='balkanAvtoDB_v1';
var db={Klijenti:[],Kamioni:[],Vozaci:[],Troskovi:[],Ture:[],Korisnici:[],Podesavanja:[]};
var user=null;
var online=false;

function setting(key,def){ var r=db.Podesavanja.find(function(x){return x.kljuc===key;}); return r?r.vrednost:def; }
function kurs(){ return n(setting('kursEurDin',117.5))||117.5; }
function pdvStopa(){ return n(setting('pdvStopa',20))||20; }

function seed(){
  return {
    Korisnici:[
      {id:'U1',korisnickoIme:'admin',lozinka:'admin',uloga:'admin',aktivan:true},
      {id:'U2',korisnickoIme:'korisnik',lozinka:'korisnik',uloga:'korisnik',aktivan:true}
    ],
    Podesavanja:[
      {kljuc:'kursEurDin',vrednost:117.5},{kljuc:'pdvStopa',vrednost:20},
      {kljuc:'nazivFirme',vrednost:'Balkan AVTO d.o.o.'}
    ],
    Klijenti:[
      {id:'C1',naziv:'AutoLog Beograd',zemlja:'SRB',valuta:'DIN',kontakt:'office@autolog.rs',aktivan:true},
      {id:'C2',naziv:'EuroCars GmbH',zemlja:'DEU',valuta:'EUR',kontakt:'info@eurocars.de',aktivan:true}
    ],
    Kamioni:[
      {id:'K1',registracija:'NS-123-AB',naziv:'Volvo FH (8 vozila)',aktivan:true},
      {id:'K2',registracija:'BG-456-CD',naziv:'Scania R (10 vozila)',aktivan:true}
    ],
    Vozaci:[
      {id:'V1',ime:'Marko Markovi\u0107',aktivan:true},
      {id:'V2',ime:'Petar Petrovi\u0107',aktivan:true}
    ],
    Troskovi: seedCosts(),
    Ture: seedTours()
  };
}

function seedCosts(){
  return [
    {id:'T1',naziv:'Gorivo',kategorija:'Gorivo',jedinica:'km',iznos:0.42,kamionId:'',aktivan:true},
    {id:'T2',naziv:'Gume',kategorija:'Odr\u017eavanje',jedinica:'km',iznos:0.05,kamionId:'',aktivan:true},
    {id:'T3',naziv:'Servis i odr\u017eavanje',kategorija:'Odr\u017eavanje',jedinica:'km',iznos:0.08,kamionId:'',aktivan:true},
    {id:'T4',naziv:'Amortizacija',kategorija:'Fiksno',jedinica:'km',iznos:0.15,kamionId:'',aktivan:true},
    {id:'T5',naziv:'Dnevnice voza\u010da',kategorija:'Voza\u010d',jedinica:'dan',iznos:45,kamionId:'',aktivan:true},
    {id:'T6',naziv:'Plata voza\u010da (deo)',kategorija:'Voza\u010d',jedinica:'dan',iznos:35,kamionId:'',aktivan:true},
    {id:'T7',naziv:'Putarine',kategorija:'Putni',jedinica:'tura',iznos:180,kamionId:'',aktivan:true},
    {id:'T8',naziv:'Trajekt/vinjete',kategorija:'Putni',jedinica:'tura',iznos:60,kamionId:'',aktivan:true},
    {id:'T9',naziv:'Osiguranje',kategorija:'Fiksno',jedinica:'dan',iznos:12,kamionId:'',aktivan:true},
    {id:'T10',naziv:'Administracija',kategorija:'Fiksno',jedinica:'tura',iznos:25,kamionId:'',aktivan:true},
    {id:'T11',naziv:'Pranje vozila',kategorija:'Odr\u017eavanje',jedinica:'tura',iznos:20,kamionId:'',aktivan:true},
    {id:'T12',naziv:'AdBlue',kategorija:'Gorivo',jedinica:'km',iznos:0.03,kamionId:'',aktivan:true}
  ];
}

function seedTours(){
  var base=[
    {broj:'TOUR-2026-0001',klijentId:'C2',kamionId:'K1',vozacId:'V1',datumUtovara:'2026-01-08',datumIstovara:'2026-01-12',
     kmPrazni:120,kmTovareni:1080,relacija:'Novi Sad \u2192 M\u00fcnchen',prihod:2520,valuta:'EUR',saPdv:false,status:'realizovana',napomena:''},
    {broj:'TOUR-2026-0002',klijentId:'C1',kamionId:'K2',vozacId:'V2',datumUtovara:'2026-02-02',datumIstovara:'2026-02-04',
     kmPrazni:60,kmTovareni:520,relacija:'Beograd \u2192 Ni\u0161',prihod:235000,valuta:'DIN',saPdv:true,status:'realizovana',napomena:''},
    {broj:'TOUR-2026-0003',klijentId:'C2',kamionId:'K1',vozacId:'V1',datumUtovara:'2026-03-05',datumIstovara:'2026-03-09',
     kmPrazni:90,kmTovareni:1150,relacija:'Beograd \u2192 Be\u010d',prihod:2300,valuta:'EUR',saPdv:false,status:'planirana',napomena:''}
  ];
  return base.map(function(t){ t.id=uid('TUR'); t.createdAt=todayISO(); return computeTour(t,seedCostsForCalc()); });
}
function seedCostsForCalc(){ return seedCosts(); }

/* ---------- API (Apps Script) ---------- */
function apiCall(action,payload){
  var body=Object.assign({action:action},payload||{});
  return fetch(CONFIG.apiUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(body)}).then(function(r){return r.json();}).then(function(j){
      if(!j.ok) throw new Error(j.error||'Gre\u0161ka servera'); return j.data; });
}

function saveLS(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(db)); }catch(e){} }
function loadLS(){ try{ var s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }

function setCloud(on){ online=on; var b=document.getElementById('cloudBadge');
  b.className='cloud '+(on?'on':'off'); b.textContent=on?'\u25cf Google Sheets':'\u25cf Lokalno'; }

function loadDB(){
  if(CONFIG.apiUrl){
    return apiCall('getAll').then(function(data){
      Object.keys(db).forEach(function(k){ db[k]=data[k]||[]; });
      setCloud(true); saveLS();
    }).catch(function(e){
      var ls=loadLS(); if(ls){ db=ls; } else { db=seed(); }
      setCloud(false); toast('Cloud nedostupan \u2014 radim lokalno');
    });
  }
  var ls=loadLS();
  db = ls || seed();
  if(!ls) saveLS();
  setCloud(false);
  return Promise.resolve();
}

function dbSave(coll,rec){
  var arr=db[coll]; var kf=(coll==='Podesavanja')?'kljuc':'id';
  var i=arr.findIndex(function(x){return String(x[kf])===String(rec[kf]);});
  if(i>=0) arr[i]=rec; else arr.push(rec);
  saveLS();
  if(CONFIG.apiUrl&&online) return apiCall('save',{collection:coll,record:rec});
  return Promise.resolve(rec);
}
function dbDelete(coll,id){
  var kf=(coll==='Podesavanja')?'kljuc':'id';
  db[coll]=db[coll].filter(function(x){return String(x[kf])!==String(id);});
  saveLS();
  if(CONFIG.apiUrl&&online) return apiCall('delete',{collection:coll,id:id});
  return Promise.resolve();
}
function dbBulk(coll,recs){
  db[coll]=recs; saveLS();
  if(CONFIG.apiUrl&&online) return apiCall('bulkSave',{collection:coll,records:recs});
  return Promise.resolve(recs);
}

/* ============================================================
   MOTOR OBRA\u010cUNA
   ============================================================ */
function activeCostsFor(kamionId,costList){
  return (costList||db.Troskovi).filter(function(c){
    return (c.aktivan===true||c.aktivan==='true') && (!c.kamionId || String(c.kamionId)===String(kamionId));
  });
}

// Vraća turu sa izračunatim poljima + snapshot-om troškova (tourCosts).
function computeTour(t,costList){
  t.dani = daysBetween(t.datumUtovara,t.datumIstovara);
  t.kmPrazni = n(t.kmPrazni); t.kmTovareni = n(t.kmTovareni);
  t.kmUkupno = t.kmPrazni + t.kmTovareni;

  var costs=[], total=0;
  activeCostsFor(t.kamionId,costList).forEach(function(c){
    var kolicina = c.jedinica==='km'?t.kmUkupno : c.jedinica==='dan'?t.dani : 1;
    var ukupno = n(c.iznos)*kolicina;
    costs.push({naziv:c.naziv,kategorija:c.kategorija,jedinica:c.jedinica,
      iznos:n(c.iznos),kolicina:kolicina,ukupno:Math.round(ukupno*100)/100});
    total+=ukupno;
  });
  t.tourCosts=costs;
  t.trosakEUR=Math.round(total*100)/100;

  // Prihod → neto (bez PDV-a) → u EUR
  var bruto=n(t.prihod);
  var neto = (t.saPdv===true||t.saPdv==='true') ? bruto/(1+pdvStopa()/100) : bruto;
  var netoEUR = (t.valuta==='DIN') ? neto/kurs() : neto;
  t.prihodNetoEUR=Math.round(netoEUR*100)/100;
  t.profitEUR=Math.round((netoEUR-total)*100)/100;
  t.marza = netoEUR>0 ? Math.round((t.profitEUR/netoEUR)*10000)/100 : 0;
  return t;
}

// Ponovni obračun svih tura sa TRENUTNIM troškovima/podešavanjima.
function refreshTourCosts(){
  db.Ture=db.Ture.map(function(t){ return computeTour(t,db.Troskovi); });
  return dbBulk('Ture',db.Ture).then(function(){ toast('Tro\u0161kovi tura su preračunati'); });
}

/* ---------- Lookups ---------- */
function byId(coll,id){ return db[coll].find(function(x){return String(x.id)===String(id);}); }
function clientName(id){ var c=byId('Klijenti',id); return c?c.naziv:'\u2014'; }
function clientCur(id){ var c=byId('Klijenti',id); return c?c.valuta:'EUR'; }
function truckName(id){ var k=byId('Kamioni',id); return k?(k.registracija+(k.naziv?' \u00b7 '+k.naziv:'')):'\u2014'; }
function driverName(id){ var v=byId('Vozaci',id); return v?v.ime:'\u2014'; }

var current='dash';

function isAdmin(){ return user && user.uloga==='admin'; }

function renderNav(){
  var nav=document.getElementById('nav'); nav.innerHTML='';
  VIEWS.forEach(function(v){
    if(v.admin && !isAdmin()) return;
    if(v.grp){ var g=document.createElement('div'); g.className='group'; g.textContent=v.grp; nav.appendChild(g); return; }
    var b=document.createElement('button'); b.id='nav-'+v.key;
    b.innerHTML='<span class="ico">'+v.ico+'</span>'+v.title;
    b.onclick=function(){ go(v.key); };
    nav.appendChild(b);
  });
  document.getElementById('who').innerHTML='<b>'+esc(user.korisnickoIme)+'</b><br>'+
    '<span class="role">'+(isAdmin()?'Administrator':'Korisnik')+'</span><br>'+
    '<button class="btn ghost sm" style="margin-top:10px" onclick="logout()">Odjava</button>';
}

function go(key){
  var v=VIEWS.find(function(x){return x.key===key;});
  if(!v) return;
  if(v.admin && !isAdmin()){ key='dash'; v=VIEWS.find(function(x){return x.key==='dash';}); }
  current=key;
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active');});
  var ab=document.getElementById('nav-'+key); if(ab) ab.classList.add('active');
  document.getElementById('viewTitle').textContent=v.title;
  document.getElementById('viewDesc').textContent=v.desc||'';
  RENDER[key]();
}

function doLogin(){
  var u=document.getElementById('loginUser').value.trim();
  var p=document.getElementById('loginPass').value;
  var err=document.getElementById('loginErr');
  function ok(usr){
    if(!usr){ err.textContent='Pogrešno korisničko ime ili lozinka.'; return; }
    user={id:usr.id,korisnickoIme:usr.korisnickoIme,uloga:usr.uloga};
    sessionStorage.setItem('ba_user',JSON.stringify(user));
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    renderNav(); go('dash');
  }
  if(CONFIG.apiUrl&&online){
    apiCall('login',{korisnickoIme:u,lozinka:p}).then(ok).catch(function(){err.textContent='Greška pri prijavi.';});
  }else{
    var usr=db.Korisnici.find(function(x){return x.korisnickoIme===u&&String(x.lozinka)===p&&(x.aktivan!==false&&x.aktivan!=='false');});
    ok(usr||null);
  }
}
function logout(){ user=null; sessionStorage.removeItem('ba_user');
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('loginPass').value=''; }

document.addEventListener('keydown',function(e){
  if(e.key==='Enter' && document.getElementById('login').style.display!=='none'){ doLogin(); }
});

/* Sortabilna tabela: cols=[{k,label,r?,fmt?,raw?}] */
var sortState={};
function sortableTable(tableId,rows,cols,opts){
  opts=opts||{};
  var st=sortState[tableId]||{k:opts.defaultSort||cols[0].k,dir:opts.defaultDir||'asc'};
  sortState[tableId]=st;
  var sorted=rows.slice().sort(function(a,b){
    var col=cols.find(function(c){return c.k===st.k;});
    var va=col&&col.raw?col.raw(a):a[st.k], vb=col&&col.raw?col.raw(b):b[st.k];
    if(typeof va==='number'&&typeof vb==='number'){} 
    else { va=String(va==null?'':va).toLowerCase(); vb=String(vb==null?'':vb).toLowerCase(); }
    if(va<vb) return st.dir==='asc'?-1:1; if(va>vb) return st.dir==='asc'?1:-1; return 0;
  });
  var head=cols.map(function(c){
    var arrow=st.k===c.k?(st.dir==='asc'?' \u25b2':' \u25bc'):'';
    return '<th class="sortable'+(c.r?' r':'')+'" onclick="resort(\''+tableId+'\',\''+c.k+'\')">'+esc(c.label)+arrow+'</th>';
  }).join('')+(opts.actions?'<th></th>':'');
  var body=sorted.map(function(row){
    return '<tr>'+cols.map(function(c){
      var val=c.fmt?c.fmt(row):esc(row[c.k]);
      return '<td class="'+(c.r?'r ':'')+(c.cls?c.cls(row):'')+'">'+val+'</td>';
    }).join('')+(opts.actions?'<td class="r">'+opts.actions(row)+'</td>':'')+'</tr>';
  }).join('');
  return '<div style="overflow:auto"><table id="'+tableId+'"><thead><tr>'+head+'</tr></thead><tbody>'+
    (sorted.length?body:'<tr><td colspan="'+(cols.length+1)+'" style="color:var(--muted);padding:18px">Nema podataka.</td></tr>')+
    '</tbody></table></div>';
}
function resort(tableId,k){ var st=sortState[tableId]; if(st.k===k){st.dir=st.dir==='asc'?'desc':'asc';}else{st.k=k;st.dir='asc';} RENDER[current](); }

    '<div class="body">'+body+'</div><div class="foot">'+

    (onSave?'<button class="btn" id="modalSave">'+(opts.saveLabel||'Sačuvaj')+'</button>':'')+
    '</div></div></div>');
  document.body.appendChild(m); m._onSave=onSave;
  if(onSave) m.querySelector('#modalSave').onclick=function(){ onSave(m); };
  if(opts.onOpen) opts.onOpen(m);
}

var RENDER={};

RENDER.dash=function(){
  var realiz=db.Ture.filter(function(t){return t.status==='realizovana';});
  var prihod=realiz.reduce(function(s,t){return s+n(t.prihodNetoEUR);},0);
  var trosak=realiz.reduce(function(s,t){return s+n(t.trosakEUR);},0);
  var profit=prihod-trosak;
  var km=realiz.reduce(function(s,t){return s+n(t.kmUkupno);},0);
  var marza=prihod>0?(profit/prihod*100):0;
  var plan=db.Ture.filter(function(t){return t.status==='planirana';}).length;

  setView(
    '<div class="grid kpis" style="margin-bottom:18px">'+
      kpi('Realizovane ture',realiz.length+' / '+db.Ture.length,'planiranih: '+plan)+
      kpi('Prihod (neto)',eur(prihod),'svedeno na EUR')+
      kpi('Troškovi',eur(trosak),'snapshot po turama')+
      kpi('Profit',eur(profit),null,profit>=0?'green':'red')+
      kpi('Prosečna marža',pct(marza),null,marza>=0?'green':'red')+
      kpi('Prihod / km',km>0?perKm(prihod/km):'\u2014','prosek realizovanih')+
    '</div>'+
    '<div class="two-charts">'+
      '<div class="card"><h3>Profit po mesecima (EUR)</h3><div class="chart-wrap"><canvas id="chMonth"></canvas></div></div>'+
      '<div class="card"><h3>Prihod po klijentu (EUR)</h3><div class="chart-wrap"><canvas id="chClient"></canvas></div></div>'+
    '</div>'+
    '<div class="card"><h3>Poslednje ture</h3>'+toursMiniTable(db.Ture.slice().sort(function(a,b){return (b.datumUtovara||'').localeCompare(a.datumUtovara||'');}).slice(0,6))+'</div>'
  );
  drawMonthChart('chMonth',realiz);
  drawClientChart('chClient',realiz);
};
function kpi(lbl,val,sub,cls){ return '<div class="kpi"><div class="lbl">'+lbl+'</div>'+
  '<div class="val '+(cls||'')+'">'+val+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>'; }

function toursMiniTable(rows){
  return '<div style="overflow:auto"><table><thead><tr><th>Broj</th><th>Klijent</th><th>Relacija</th>'+
    '<th class="r">Km</th><th class="r">Profit (EUR)</th><th class="r">Marža</th><th>Status</th></tr></thead><tbody>'+
    (rows.length?rows.map(function(t){return '<tr><td>'+esc(t.broj)+'</td><td>'+esc(clientName(t.klijentId))+
    '</td><td>'+esc(t.relacija||'')+'</td><td class="r num">'+nf0.format(t.kmUkupno)+'</td>'+
    '<td class="r num '+(t.profitEUR>=0?'pos':'neg')+'">'+eur(t.profitEUR)+'</td>'+
    '<td class="r num">'+pct(t.marza)+'</td><td>'+statusPill(t.status)+'</td></tr>';}).join(''):
    '<tr><td colspan="7" style="color:var(--muted);padding:16px">Nema tura.</td></tr>')+'</tbody></table></div>';
}

function monthsAgg(tours){
  var map={};
  tours.forEach(function(t){ var m=(t.datumUtovara||'').slice(0,7); if(!m) return;
    if(!map[m]) map[m]={prihod:0,trosak:0,profit:0}; map[m].prihod+=n(t.prihodNetoEUR);
    map[m].trosak+=n(t.trosakEUR); map[m].profit+=n(t.profitEUR); });
  return Object.keys(map).sort().map(function(k){return {m:k,v:map[k]};});
}
function drawMonthChart(id,tours){
  var a=monthsAgg(tours);
  makeChart(id,{type:'bar',data:{labels:a.map(function(x){return x.m;}),
    datasets:[{label:'Profit',data:a.map(function(x){return Math.round(x.v.profit);}),
      backgroundColor:a.map(function(x){return x.v.profit>=0?'#1f9d57':'#d6453f';}),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{ticks:{callback:function(v){return v+' \u20ac';}}}}}});
}
function drawClientChart(id,tours){
  var map={}; tours.forEach(function(t){ var c=clientName(t.klijentId); map[c]=(map[c]||0)+n(t.prihodNetoEUR); });
  var labels=Object.keys(map);
  makeChart(id,{type:'doughnut',data:{labels:labels,datasets:[{data:labels.map(function(l){return Math.round(map[l]);}),
    backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}});
}

/* ---------------- TURE ---------------- */
var tureF={status:'',klijent:'',kamion:'',od:'',doo:'',q:''};
function nextTourBroj(){
  var y=new Date().getFullYear(), pref='TOUR-'+y+'-';
  var max=0; db.Ture.forEach(function(t){ if((t.broj||'').indexOf(pref)===0){ var num=parseInt(t.broj.slice(pref.length),10)||0; if(num>max)max=num; } });
  return pref+String(max+1).padStart(4,'0');
}
function tureFiltered(){
  return db.Ture.filter(function(t){
    if(tureF.status&&t.status!==tureF.status) return false;
    if(tureF.klijent&&String(t.klijentId)!==tureF.klijent) return false;
    if(tureF.kamion&&String(t.kamionId)!==tureF.kamion) return false;
    if(tureF.od&&(t.datumUtovara||'')<tureF.od) return false;
    if(tureF.doo&&(t.datumUtovara||'')>tureF.doo) return false;
    if(tureF.q){ var s=(t.broj+' '+t.relacija+' '+clientName(t.klijentId)).toLowerCase();
      if(s.indexOf(tureF.q.toLowerCase())<0) return false; }
    return true;
  });
}
function setTureF(k,v){ tureF[k]=v; RENDER.ture(); }

  return {datumUtovara:document.getElementById('f_utovar').value,datumIstovara:document.getElementById('f_istovar').value,
    kmPrazni:document.getElementById('f_kmprazni').value,kmTovareni:document.getElementById('f_kmtovareni').value,

function recalcForm(){
  var f=readForm(); var t=Object.assign({},f); computeTour(t,db.Troskovi);
  document.getElementById('f_dani').textContent='Broj dana: '+t.dani;
  document.getElementById('f_km').textContent='Ukupno km: '+nf0.format(t.kmUkupno)+'  (prazni '+nf0.format(t.kmPrazni)+' + tovareni '+nf0.format(t.kmTovareni)+')';

/* ---------------- GENERIČKI CRUD (administracija) ---------------- */
function yn(v){ return (v===true||v==='true')?'Da':'Ne'; }
function entityForm(coll,title,fields,id,after){
  var rec=id?Object.assign({},byId(coll,id)):{};
  if(!id) rec.id=uid(coll.slice(0,3).toUpperCase());
  var body=fields.map(function(f){
    var v=rec[f.k]; var fid='ef_'+f.k;
    if(f.type==='select') return '<div style="margin-top:6px"><label>'+f.label+'</label><select id="'+fid+'"'+(f.on?' onchange="'+f.on+'"':'')+'>'+
      f.opts.map(function(o){return '<option value="'+esc(o.v)+'"'+(String(v)===String(o.v)?' selected':'')+'>'+esc(o.l)+'</option>';}).join('')+'</select></div>';
    if(f.type==='checkbox') return '<div style="margin-top:10px"><label><input type="checkbox" id="'+fid+'" style="width:auto;margin-right:6px"'+((v!==false&&v!=='false'&&v!=='')||v===undefined&&f.def?' checked':'')+'>'+f.label+'</label></div>';
    return '<div style="margin-top:6px"><label>'+f.label+'</label><input id="'+fid+'" type="'+(f.type||'text')+'"'+(f.step?' step="'+f.step+'"':'')+' value="'+esc(v==null?(f.def||''):v)+'"></div>';
  }).join('');
  openModal(title,body,function(m){
    fields.forEach(function(f){
      var e=m.querySelector('#ef_'+f.k);
      if(f.type==='checkbox') rec[f.k]=e.checked;
      else if(f.type==='number') rec[f.k]=n(e.value);
      else rec[f.k]=e.value;
    });
    dbSave(coll,rec).then(function(){ closeModal(); after(); toast('Sačuvano'); });
  });
}

/* ---------------- IZVEŠTAJI ---------------- */
var izvF={od:'',doo:'',status:'realizovana',klijent:'',kamion:'',vozac:'',grupa:'klijent'};
function setIzvF(k,v){ izvF[k]=v; RENDER.izv(); }
function izvTours(){
  return db.Ture.filter(function(t){
    if(izvF.status&&t.status!==izvF.status) return false;
    if(izvF.klijent&&String(t.klijentId)!==izvF.klijent) return false;
    if(izvF.kamion&&String(t.kamionId)!==izvF.kamion) return false;
    if(izvF.vozac&&String(t.vozacId)!==izvF.vozac) return false;
    if(izvF.od&&(t.datumUtovara||'')<izvF.od) return false;
    if(izvF.doo&&(t.datumUtovara||'')>izvF.doo) return false;
    return true;
  });
}
function aggBy(tours,labelFn){
  var map={};
  tours.forEach(function(t){ var l=labelFn(t)||'\u2014';
    if(!map[l]) map[l]={label:l,prihod:0,trosak:0,profit:0,km:0,broj:0};
    map[l].prihod+=n(t.prihodNetoEUR); map[l].trosak+=n(t.trosakEUR);
    map[l].profit+=n(t.profitEUR); map[l].km+=n(t.kmUkupno); map[l].broj++; });
  return Object.keys(map).map(function(k){var r=map[k]; r.marza=r.prihod>0?r.profit/r.prihod*100:0;
    r.eurkm=r.km>0?r.prihod/r.km:0; return r;});
}

RENDER.izv=function(){
  var tours=izvTours();
  var grupe={klijent:'Klijent',kamion:'Kamion',vozac:'Vozač',mesec:'Mesec',kategorija:'Kategorija troška'};
  var sumP=tours.reduce(function(s,t){return s+n(t.prihodNetoEUR);},0);
  var sumT=tours.reduce(function(s,t){return s+n(t.trosakEUR);},0);
  var sumKm=tours.reduce(function(s,t){return s+n(t.kmUkupno);},0);

  var html='<div class="card"><div class="toolbar">'+
    '<div class="f sm"><label>Period od</label><input type="date" value="'+esc(izvF.od)+'" onchange="setIzvF(\'od\',this.value)"></div>'+
    '<div class="f sm"><label>do</label><input type="date" value="'+esc(izvF.doo)+'" onchange="setIzvF(\'doo\',this.value)"></div>'+
    '<div class="f sm"><label>Status</label><select onchange="setIzvF(\'status\',this.value)"><option value="">Sve</option>'+
      ['planirana','realizovana','otkazana'].map(function(s){return '<option value="'+s+'"'+(izvF.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'+
    '<div class="f"><label>Klijent</label><select onchange="setIzvF(\'klijent\',this.value)"><option value="">Svi</option>'+options(db.Klijenti,izvF.klijent,function(c){return c.id;},function(c){return c.naziv;})+'</select></div>'+
    '<div class="f"><label>Kamion</label><select onchange="setIzvF(\'kamion\',this.value)"><option value="">Svi</option>'+options(db.Kamioni,izvF.kamion,function(k){return k.id;},function(k){return k.registracija;})+'</select></div>'+
    '<div class="f"><label>Vozač</label><select onchange="setIzvF(\'vozac\',this.value)"><option value="">Svi</option>'+options(db.Vozaci,izvF.vozac,function(v){return v.id;},function(v){return v.ime;})+'</select></div>'+
    '<div class="f"><label>Grupiši po</label><select onchange="setIzvF(\'grupa\',this.value)">'+
      Object.keys(grupe).map(function(g){return '<option value="'+g+'"'+(izvF.grupa===g?' selected':'')+'>'+grupe[g]+'</option>';}).join('')+'</select></div>'+
    '<div style="margin-left:auto"><button class="btn ghost" onclick="izvReset()">Reset</button></div>'+
    '</div>'+
    '<div class="grid kpis" style="margin-top:4px">'+
      kpi('Broj tura',tours.length)+kpi('Prihod (neto)',eur(sumP))+kpi('Troškovi',eur(sumT))+
      kpi('Profit',eur(sumP-sumT),null,(sumP-sumT)>=0?'green':'red')+
      kpi('Marža',pct(sumP>0?(sumP-sumT)/sumP*100:0),null,(sumP-sumT)>=0?'green':'red')+
      kpi('Prihod/km',sumKm>0?perKm(sumP/sumKm):'\u2014')+
    '</div></div>';

  if(izvF.grupa==='kategorija'){
    html+=reportKategorija(tours);
  } else if(izvF.grupa==='mesec'){
    html+=reportMesec(tours);
  } else {
    var lf=izvF.grupa==='klijent'?function(t){return clientName(t.klijentId);}:
           izvF.grupa==='kamion'?function(t){return truckName(t.kamionId);}:
           function(t){return driverName(t.vozacId);};
    html+=reportDim(tours,lf,grupe[izvF.grupa]);
  }
  setView(html);

  // crtanje grafikona nakon umetanja
  if(izvF.grupa==='kategorija'){ drawKatChart(tours); }
  else if(izvF.grupa==='mesec'){ drawMesecChart(tours); }
  else {
    var lf2=izvF.grupa==='klijent'?function(t){return clientName(t.klijentId);}:
            izvF.grupa==='kamion'?function(t){return truckName(t.kamionId);}:
            function(t){return driverName(t.vozacId);};
    drawDimChart(aggBy(tours,lf2));
  }
};
function izvReset(){ izvF={od:'',doo:'',status:'realizovana',klijent:'',kamion:'',vozac:'',grupa:izvF.grupa}; RENDER.izv(); }

function reportDim(tours,lf,naziv){
  var a=aggBy(tours,lf).sort(function(x,y){return y.profit-x.profit;});
  var body=a.map(function(r){return '<tr><td>'+esc(r.label)+'</td><td class="r num">'+r.broj+'</td>'+
    '<td class="r num">'+nf0.format(r.km)+'</td><td class="r num">'+eur(r.prihod)+'</td>'+
    '<td class="r num">'+eur(r.trosak)+'</td><td class="r num '+(r.profit>=0?'pos':'neg')+'">'+eur(r.profit)+'</td>'+
    '<td class="r num '+(r.marza>=0?'pos':'neg')+'">'+pct(r.marza)+'</td><td class="r num">'+perKm(r.eurkm)+'</td></tr>';}).join('');
  return '<div class="card"><h3>Profit po grupi: '+esc(naziv)+'</h3><div class="chart-wrap"><canvas id="chDim"></canvas></div></div>'+
    '<div class="card"><h3>Tabela — '+esc(naziv)+'</h3><div style="overflow:auto"><table><thead><tr><th>'+esc(naziv)+
    '</th><th class="r">Tura</th><th class="r">Km</th><th class="r">Prihod €</th><th class="r">Trošak €</th>'+
    '<th class="r">Profit €</th><th class="r">Marža</th><th class="r">€/km</th></tr></thead><tbody>'+
    (body||'<tr><td colspan="8" style="color:var(--muted);padding:16px">Nema podataka za zadati period.</td></tr>')+'</tbody></table></div></div>';
}
function drawDimChart(a){
  a=a.sort(function(x,y){return y.profit-x.profit;});
  makeChart('chDim',{type:'bar',data:{labels:a.map(function(x){return x.label;}),datasets:[
    {label:'Prihod',data:a.map(function(x){return Math.round(x.prihod);}),backgroundColor:'#1d6fb8',borderRadius:3},
    {label:'Trošak',data:a.map(function(x){return Math.round(x.trosak);}),backgroundColor:'#e8a33d',borderRadius:3},
    {label:'Profit',data:a.map(function(x){return Math.round(x.profit);}),backgroundColor:a.map(function(x){return x.profit>=0?'#1f9d57':'#d6453f';}),borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:function(v){return v+' \u20ac';}}}}}});
}

function reportMesec(tours){
  var a=monthsAgg(tours);
  var body=a.map(function(x){var m=x.v;var marza=m.prihod>0?m.profit/m.prihod*100:0;
    return '<tr><td>'+x.m+'</td><td class="r num">'+eur(m.prihod)+'</td><td class="r num">'+eur(m.trosak)+
    '</td><td class="r num '+(m.profit>=0?'pos':'neg')+'">'+eur(m.profit)+'</td><td class="r num '+(marza>=0?'pos':'neg')+'">'+pct(marza)+'</td></tr>';}).join('');
  return '<div class="card"><h3>Kretanje po mesecima</h3><div class="chart-wrap"><canvas id="chMes"></canvas></div></div>'+
    '<div class="card"><h3>Tabela po mesecima</h3><div style="overflow:auto"><table><thead><tr><th>Mesec</th>'+
    '<th class="r">Prihod €</th><th class="r">Trošak €</th><th class="r">Profit €</th><th class="r">Marža</th></tr></thead><tbody>'+
    (body||'<tr><td colspan="5" style="color:var(--muted);padding:16px">Nema podataka.</td></tr>')+'</tbody></table></div></div>';
}
function drawMesecChart(tours){
  var a=monthsAgg(tours);
  makeChart('chMes',{data:{labels:a.map(function(x){return x.m;}),datasets:[
    {type:'bar',label:'Profit',data:a.map(function(x){return Math.round(x.v.profit);}),backgroundColor:a.map(function(x){return x.v.profit>=0?'#1f9d57':'#d6453f';}),borderRadius:3,order:2},
    {type:'line',label:'Prihod',data:a.map(function(x){return Math.round(x.v.prihod);}),borderColor:'#1d6fb8',backgroundColor:'#1d6fb8',tension:.3,order:1},
    {type:'line',label:'Trošak',data:a.map(function(x){return Math.round(x.v.trosak);}),borderColor:'#e8a33d',backgroundColor:'#e8a33d',tension:.3,order:1}
  ]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:function(v){return v+' \u20ac';}}}}}});
}

function reportKategorija(tours){
  var map={}; tours.forEach(function(t){ (t.tourCosts||[]).forEach(function(c){ map[c.kategorija]=(map[c.kategorija]||0)+n(c.ukupno); }); });
  var keys=Object.keys(map).sort(function(a,b){return map[b]-map[a];});
  var tot=keys.reduce(function(s,k){return s+map[k];},0);
  var body=keys.map(function(k){return '<tr><td>'+esc(k)+'</td><td class="r num">'+eur(map[k])+'</td><td class="r num">'+pct(tot>0?map[k]/tot*100:0)+'</td></tr>';}).join('');
  return '<div class="two-charts"><div class="card"><h3>Struktura troškova po kategoriji</h3><div class="chart-wrap"><canvas id="chKat"></canvas></div></div>'+
    '<div class="card"><h3>Tabela troškova</h3><div style="overflow:auto"><table><thead><tr><th>Kategorija</th><th class="r">Iznos €</th><th class="r">Udeo</th></tr></thead><tbody>'+
    (body||'<tr><td colspan="3" style="color:var(--muted);padding:16px">Nema podataka.</td></tr>')+
    (tot>0?'<tr style="font-weight:700"><td>Ukupno</td><td class="r num">'+eur(tot)+'</td><td class="r num">100,00 %</td></tr>':'')+'</tbody></table></div></div></div>';
}
function drawKatChart(tours){
  var map={}; tours.forEach(function(t){ (t.tourCosts||[]).forEach(function(c){ map[c.kategorija]=(map[c.kategorija]||0)+n(c.ukupno); }); });
  var keys=Object.keys(map).sort(function(a,b){return map[b]-map[a];});
  makeChart('chKat',{type:'doughnut',data:{labels:keys,datasets:[{data:keys.map(function(k){return Math.round(map[k]);}),
    backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}});
}
